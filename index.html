<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
text-align:center;
padding:25px;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

nav{
display:flex;
justify-content:center;
gap:8px;
background:#111827;
padding:10px;
flex-wrap:wrap;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

section{display:none;padding:15px;}
.active{display:block;}

.card{
background:#1e293b;
padding:15px;
margin:10px auto;
border-radius:12px;
max-width:500px;
}

.option{
background:#334155;
padding:10px;
margin:6px;
border-radius:8px;
cursor:pointer;
}
.option:hover{background:#475569;}

.small{opacity:0.8;}

.lang{
position:absolute;
top:10px;
right:10px;
}

img{
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h1>MedLearn</h1>
<p id="subtitle">Medical Learning App</p>

<div class="lang">
<button onclick="setLang('ro')">RO</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
</div>
</header>

<nav>
<button onclick="show('home')" id="b1">Home</button>
<button onclick="show('quiz')" id="b2">Quiz</button>
<button onclick="show('anat')" id="b3">Anatomy</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
<h2 id="welcome">Welcome</h2>
<p class="small" id="desc">Learn medicine step by step</p>

<div class="card">
<input id="username" placeholder="Enter your name..." />
<button onclick="saveUser()">Save</button>
<p id="hello"></p>
</div>
</section>

<!-- QUIZ -->
<section id="quiz">
<h2>🧠 Quiz</h2>

<div class="card">
<div id="q">Loading...</div>

<div id="options"></div>

<p id="result"></p>
<p>Score: <span id="score">0</span></p>

<button onclick="nextQ()">Next</button>
<button onclick="reset()">Restart</button>
</div>
</section>

<!-- ANATOMY -->
<section id="anat">
<h2>🫀 Anatomy</h2>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Heart_anterior_exterior_view.jpg" onclick="info('heart')" />
<p>Click on image</p>
</div>

</section>

<script>

let lang="en";
let score=0;
let index=0;

let user="";

const quiz=[
{q:"What pumps blood?",a:0,o:["Heart","Lungs","Brain"]},
{q:"What controls body?",a:2,o:["Heart","Liver","Brain"]},
{q:"What helps breathing?",a:1,o:["Brain","Lungs","Stomach"]},
{q:"What filters blood?",a:1,o:["Heart","Kidney","Skin"]},
{q:"What protects brain?",a:0,o:["Skull","Skin","Liver"]}
];

const t={
en:{welcome:"Welcome",desc:"Learn medicine step by step"},
ro:{welcome:"Bine ai venit",desc:"Învață medicină pas cu pas"},
fr:{welcome:"Bienvenue",desc:"Apprenez la médecine étape par étape"}
};

function setLang(l){
lang=l;
document.getElementById("welcome").innerText=t[l].welcome;
document.getElementById("desc").innerText=t[l].desc;
}

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function loadQ(){
let q=quiz[index];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((opt,i)=>{
html+=`<div class='option' onclick='ans(${i})'>${opt}</div>`;
});

document.getElementById("options").innerHTML=html;
}

function ans(i){
if(i===quiz[index].a){
score++;
document.getElementById("result").innerText="✔ Correct";
}else{
document.getElementById("result").innerText="✖ Wrong";
}
document.getElementById("score").innerText=score;
}

function nextQ(){
index++;
if(index>=quiz.length) index=0;
loadQ();
}

function reset(){
score=0;
index=0;
document.getElementById("score").innerText=0;
loadQ();
}

function saveUser(){
user=document.getElementById("username").value;
localStorage.setItem("user",user);
document.getElementById("hello").innerText="Hello " + user;
}

function info(type){
alert(type==="heart" ? "Heart pumps blood" : "");
}

loadQ();

</script>

</body>
</html>
