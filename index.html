<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#333;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* QUIZ */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
min-height:260px;
font-size:20px;
color:#333;
line-height:1.8;
font-weight:500;
}

/* DIFFICULTY BADGE */
.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

/* BUTTONS ROW */
.button-row{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.button-row button{
width:140px;
}

/* SCORE */
.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}

/* ANATOMY */
.anatomy-card{
background:white;
padding:50px;
border-radius:30px;
width:95%;
max-width:1400px;
box-shadow:0 20px 60px rgba(0,0,0,0.18);
display:flex;
flex-direction:column;
gap:80px;
}

.anatomy-item h3{
font-size:34px;
color:#111;
margin:0;
}

iframe{
width:100%;
height:800px;
border:none;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start Quiz</button>
</div>

<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span> / 30</h2>

<div class="card">
<div id="badge" class="badge green">EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>
</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

<div class="button-row">
<button onclick="next()">⬅ NEXT</button>
<button onclick="restart()">↻ RESTART</button>
</div>

</section>

<script>

const quiz = [
{q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli are where oxygen enters blood and CO2 leaves."},
{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"Heart pumps blood."},
{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephron filters blood."},
{q:"RBC carries?",a:["Oxygen","Sugar","Fat","CO2"],c:0,e:"RBC carries oxygen."},
{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"Skin protects body."},
{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Pancreas produces insulin."},
{q:"Arteries carry blood?",a:["Away from heart","To heart","Both","None"],c:0,e:"Arteries carry blood away."},
{q:"Veins carry blood?",a:["To heart","Away","Only oxygen","Only CO2"],c:0,e:"Veins return blood."},
{q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,e:"Brain controls body."},
{q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,e:"Lungs exchange gases."},

{q:"SA node?",a:["Pacemaker","Filter","Pump","Neuron"],c:0,e:"Controls heartbeat."},
{q:"Platelets?",a:["Clotting","Oxygen","Digestion","Hormones"],c:0,e:"Clot blood."},
{q:"Liver function?",a:["Detox","Breathing","Movement","Vision"],c:0,e:"Detoxifies body."},
{q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,e:"Starts in mouth."},
{q:"Neuron?",a:["Signal","Blood","Digestion","Clotting"],c:0,e:"Sends signals."},

{q:"Hemoglobin?",a:["Oxygen","Sugar","Fat","Water"],c:0,e:"Carries oxygen."},
{q:"Cerebellum?",a:["Balance","Vision","Digestion","Breathing"],c:0,e:"Balance control."},
{q:"Pressure highest?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,e:"Arteries high pressure."},
{q:"CNS?",a:["Brain+spine","Nerves","Muscles","Heart"],c:0,e:"Brain + spinal cord."},
{q:"Pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,e:"Starts heartbeat."},

{q:"Urea formed in?",a:["Liver","Kidney","Heart","Lungs"],c:0,e:"Liver makes urea."},
{q:"Pulmonary?",a:["Heart-lungs-heart","Heart-body-heart","Brain-heart","Liver-heart"],c:0,e:"Blood goes to lungs."},
{q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,e:"~120 days life."},
{q:"Diffusion?",a:["Passive movement","Active pump","Muscle force","Heartbeat"],c:0,e:"High to low movement."},
{q:"Insulin role?",a:["Lower sugar","Increase oxygen","Make blood","Digest fats"],c:0,e:"Lowers glucose."},

{q:"Nephron?",a:["Filtration","Digestion","Breathing","Movement"],c:0,e:"Filters blood."},
{q:"Oxygen binds?",a:["Hemoglobin iron","Plasma","Platelets","DNA"],c:0,e:"Binds iron."},
{q:"Veins pressure?",a:["Low","High","Medium","None"],c:0,e:"Low pressure."},
{q:"Skin?",a:["Protection","Digestion","Respiration","Circulation"],c:0,e:"Protects body."}
];

let i=0;
let score=0;
let locked=false;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function setBadge(){
let b=document.getElementById("badge");

if(i<10){
b.innerText="EASY";
b.className="badge green";
}
else if(i<20){
b.innerText="MEDIUM";
b.className="badge yellow";
}
else{
b.innerText="HARD";
b.className="badge red";
}
}

function load(){
locked=false;

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;
document.getElementById("score").innerText=score;

setBadge();

let html="";
q.a.forEach((a,idx)=>{
html+=`<div class="option" onclick="answer(${idx})">${a}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";
}

function answer(idx){
if(locked) return;
locked=true;

if(idx===quiz[i].c){
score++;
document.getElementById("score").innerText=score;
}

document.getElementById("explanation").innerText=quiz[i].e;

document.querySelectorAll(".option").forEach(o=>{
o.style.pointerEvents="none";
});
}

function next(){
if(i<quiz.length-1){
i++;
load();
}else{
alert("Final Score: "+score+"/"+quiz.length);
i=0;
score=0;
load();
}
}

function restart(){
i=0;
score=0;
load();
}

window.onload=load;

</script>

</body>
</html>
