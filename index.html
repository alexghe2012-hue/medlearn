<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#333;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

/* QUIZ CARD */
.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
min-height:260px;
font-size:20px;
color:#333;
line-height:1.8;
font-weight:500;
}

.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

/* ANATOMY */
.anatomy-card{
background:white;
padding:35px;
border-radius:30px;
width:95%;
max-width:1200px;
box-shadow:0 15px 45px rgba(0,0,0,0.12);
}

.anatomy-item{
margin-bottom:70px;
}

.anatomy-item h3{
margin-bottom:15px;
font-size:24px;
color:#222;
}

iframe{
width:100%;
height:650px;
border:none;
border-radius:20px;
}

/* SCORE (jos, nu sus) */
.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start Quiz</button>
</div>

<!-- QUIZ -->
<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span> / 30</h2>

<div class="card">
<div id="badge" class="badge green">EASY</div>

<div id="question"></div>

<div id="options"></div>
<div id="explanation"></div>
</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

<button onclick="restart()">Restart</button>
<button onclick="goAnatomy()">Anatomy</button>

</section>

<!-- ANATOMY -->
<section id="anatomy">

<h2 style="font-size:48px;color:#d90429;">🫀 Anatomy Explorer</h2>

<div class="anatomy-card">

<div class="anatomy-item">
<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Heart Anatomy</h3>
<iframe src="https://sketchfab.com/3d-models/heart-anatomy-and-functions-2e6726aca3e64c56b8f8d7cceae17a28/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Human Organs</h3>
<iframe src="https://sketchfab.com/3d-models/human-anatomy-organs-pack-7fd440196fe3480587de330967737848/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli are tiny air sacs where oxygen enters blood and carbon dioxide leaves. This is essential for respiration and energy production in the body."},

{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"The heart pumps blood continuously to deliver oxygen and nutrients to tissues and remove waste products."},

{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"The nephron filters blood, removes waste, and controls water and salt balance in the body."},

{q:"RBC carries?",a:["Oxygen","Sugar","Fat","CO2"],c:0,e:"Red blood cells transport oxygen using hemoglobin, which binds oxygen in the lungs and releases it in tissues."},

{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"The skin protects the body, regulates temperature, and prevents dehydration and infection."},

{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Insulin regulates blood glucose levels and is produced by the pancreas."},

{q:"Arteries carry blood?",a:["Away from heart","To heart","Both","None"],c:0,e:"Arteries carry oxygenated blood away from the heart under high pressure."},

{q:"Veins carry blood?",a:["To heart","Away","Only oxygen","Only CO2"],c:0,e:"Veins return blood back to the heart and contain valves to prevent backflow."},

{q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,e:"The brain controls movement, thought, memory, and all vital body functions."},

{q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,e:"The lungs exchange oxygen and carbon dioxide during breathing."},

{q:"SA node?",a:["Pacemaker","Filter","Pump","Neuron"],c:0,e:"SA node controls heart rhythm and acts as the natural pacemaker."},

{q:"Platelets?",a:["Clotting","Oxygen transport","Digestion","Hormones"],c:0,e:"Platelets help stop bleeding by forming blood clots."},

{q:"Liver function?",a:["Detoxification","Breathing","Movement","Vision"],c:0,e:"The liver removes toxins and processes nutrients from blood."},

{q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,e:"Digestion starts in the mouth with chewing and enzymes in saliva."},

{q:"Neuron function?",a:["Signal transmission","Blood flow","Clotting","Digestion"],c:0,e:"Neurons transmit electrical signals throughout the body."},

{q:"Hemoglobin carries?",a:["Oxygen","Sugar","Fat","Water"],c:0,e:"Hemoglobin binds and transports oxygen molecules."},

{q:"Cerebellum?",a:["Balance","Vision","Digestion","Breathing"],c:0,e:"Cerebellum controls balance and coordination."},

{q:"Blood pressure highest?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,e:"Arteries have the highest blood pressure in circulation."},

{q:"CNS includes?",a:["Brain + spinal cord","Nerves","Muscles","Heart"],c:0,e:"Central nervous system includes brain and spinal cord."},

{q:"Heart pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,e:"SA node initiates and regulates heartbeat."},

{q:"Urea formed in?",a:["Liver","Kidney","Heart","Lungs"],c:0,e:"Urea is produced in the liver from protein metabolism."},

{q:"Pulmonary circulation?",a:["Heart-lungs-heart","Heart-body-heart","Brain-heart-brain","Liver-heart-liver"],c:0,e:"Blood flows from heart to lungs and back for oxygenation."},

{q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,e:"Red blood cells live about 120 days before being replaced."},

{q:"Diffusion?",a:["Passive movement","Active pump","Muscle force","Heartbeat"],c:0,e:"Diffusion is passive movement from high to low concentration."},

{q:"Insulin role?",a:["Lower blood sugar","Increase oxygen","Make blood","Digest fats"],c:0,e:"Insulin lowers blood glucose levels."},

{q:"Nephron function?",a:["Filtration","Digestion","Breathing","Movement"],c:0,e:"Nephron filters blood in kidneys."},

{q:"Oxygen binds to?",a:["Hemoglobin iron","Plasma","Platelets","DNA"],c:0,e:"Oxygen binds to iron in hemoglobin."},

{q:"Veins pressure?",a:["Low","High","Medium","None"],c:0,e:"Veins have low pressure compared to arteries."},

{q:"Skin function?",a:["Protection","Digestion","Respiration","Circulation"],c:0,e:"Skin protects internal organs and regulates body temperature."}
];

let i=0;
let score=0;
let timer;
let locked=false;

document.getElementById("score").innerText=score;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

function setBadge(){
let b=document.getElementById("badge");

if(i<10){b.innerText="EASY";b.className="badge green";}
else if(i<20){b.innerText="MEDIUM";b.className="badge yellow";}
else{b.innerText="HARD";b.className="badge red";}
}

function shuffle(arr){
for(let j=arr.length-1;j>0;j--){
let k=Math.floor(Math.random()*(j+1));
[arr[j],arr[k]]=[arr[k],arr[j]];
}
return arr;
}

function load(){

locked=false;

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;

setBadge();

let answers=q.a.map((t,idx)=>({t,correct:idx===q.c}));
answers=shuffle(answers);

let html="";
answers.forEach(a=>{
html+=`<div class="option" onclick="answer(${a.correct})">${a.t}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";

clearTimeout(timer);
timer=setTimeout(()=>next(),90000);
}

function answer(correct){

if(locked) return;
locked=true;

if(correct){
score++;
document.getElementById("score").innerText=score;
}

document.getElementById("explanation").innerText=quiz[i].e;

document.querySelectorAll(".option")
.forEach(o=>o.style.pointerEvents="none");

clearTimeout(timer);

setTimeout(()=>{
next();
},3000);
}

function next(){

if(i>=quiz.length-1){
alert("Final Score: "+score+"/"+quiz.length);
i=0;
score=0;
}

i++;
load();
}

function restart(){
i=0;
score=0;
load();
}

window.onload=load;

</script>

</body>
</html>
