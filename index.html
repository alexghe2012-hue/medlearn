<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn Pro</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
color:#111827;
}

header{
background:#e11d48;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

nav{
display:flex;
gap:10px;
padding:10px;
background:white;
border-bottom:1px solid #e5e7eb;
}

button{
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#111827;
color:white;
}

.container{padding:15px;}

.page{display:none;}
.active{display:block;}

.card{
background:white;
border:1px solid #e5e7eb;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

/* 3D */
#viewer{
width:100%;
height:400px;
background:black;
border-radius:12px;
}
</style>
</head>

<body>

<header>🫀 MedLearn Pro</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('quiz')">Quiz</button>
<button onclick="show('anat')">3D Anatomy</button>
</nav>

<div class="container">

<!-- ================= HOME ================= -->
<div id="home" class="page active">

<div class="card">
<h2 id="title">Medical App</h2>
<p id="desc">Learn medicine like a pro student</p>
</div>

</div>

<!-- ================= QUIZ ================= -->
<div id="quiz" class="page">

<div class="card" id="quizBox"></div>

</div>

<!-- ================= ANATOMY ================= -->
<div id="anat" class="page">

<div class="card">
<h2>🫀 3D Anatomy</h2>
<div id="viewer"></div>
<p id="info">Click on body</p>
</div>

</div>

</div>

<script>

/* ================= LANGUAGE ================= */
let lang="en";

const T={
en:{title:"Medical App",desc:"Learn medicine like a pro"},
ro:{title:"Aplicație Medicală",desc:"Învață medicină ca un pro"},
fr:{title:"Application Médicale",desc:"Apprends la médecine"}
};

function setLang(l){
lang=l;
document.getElementById("title").innerText=T[l].title;
document.getElementById("desc").innerText=T[l].desc;
}

/* ================= NAV ================= */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= QUIZ AUTO ================= */
let i=0;

const quiz=[
{q:"Heart function?",o:["Pump blood","Digest food","Think"],a:0},
{q:"Lungs function?",o:["Gas exchange","Filter blood","Move"],a:0},
{q:"Brain controls?",o:["Body","Only heart","Only lungs"],a:0},
{q:"Kidneys do?",o:["Filter blood","Pump blood","Digest"],a:0},
{q:"Liver role?",o:["Detox","Pump blood","Vision"],a:0}
];

function loadQ(){
let q=quiz[i];

let html=`<h3>${q.q}</h3>`;

q.o.forEach((o,idx)=>{
html+=`<div class="card" onclick="ans(${idx})">${o}</div>`;
});

document.getElementById("quizBox").innerHTML=html;
}

function ans(x){

if(x===quiz[i].a){
document.getElementById("quizBox").innerHTML="<p>✔ Correct</p>";
}else{
document.getElementById("quizBox").innerHTML="<p>✖ Wrong</p>";
}

i++;

setTimeout(()=>{

if(i>=quiz.length) i=0;

loadQ();

},600);
}

/* INIT QUIZ */
loadQ();

/* ================= 3D ANATOMY ================= */
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

const camera=new THREE.PerspectiveCamera(75,1,0.1,1000);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth-30,400);
document.getElementById("viewer").appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,1));

/* CONTROLS */
const controls=new THREE.OrbitControls(camera,renderer.domElement);

/* MODEL (real human head placeholder) */
const loader=new THREE.GLTFLoader();

loader.load(
"https://threejs.org/examples/models/gltf/LeePerrySmith/LeePerrySmith.glb",
function(gltf){

const model=gltf.scene;
scene.add(model);

window.addEventListener("click",(e)=>{

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

mouse.x=(e.clientX/(window.innerWidth)) *2-1;
mouse.y=-(e.clientY/400)*2+1;

raycaster.setFromCamera(mouse,camera);

const hit=raycaster.intersectObject(model,true);

if(hit.length>0){
document.getElementById("info").innerText="Organ clicked → "+hit[0].object.name;
}

});

});

camera.position.z=3;

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
