<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* medical background (A) */
.hero::before{
content:"";
position:absolute;
inset:0;
background:
url("https://images.unsplash.com/photo-1580281657527-47f249e8f3e0") center/cover no-repeat;
opacity:0.18;
z-index:0;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
z-index:1;
text-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.hero p{
font-size:20px;
color:#333;
z-index:1;
}

/* medical cards (B) */
.med-cards{
display:flex;
gap:15px;
margin-top:20px;
z-index:1;
}

.med-card{
background:white;
padding:15px;
border-radius:15px;
width:140px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
font-weight:bold;
}

/* sections */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

/* QUIZ BIGGER */
.card{
background:white;
padding:40px;
border-radius:25px;
width:650px;
box-shadow:0 10px 35px rgba(0,0,0,0.12);
position:relative;
}

.option{
background:#f3f3f3;
padding:15px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#explanation{
margin-top:15px;
min-height:90px;
font-size:15px;
color:#444;
line-height:1.4;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* EASY MED HARD */
.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

/* anatomy */
.anatomy-card{
background:white;
padding:35px;
border-radius:30px;
width:95%;
max-width:1200px;
box-shadow:0 15px 45px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
gap:30px;
}

.model-box{
background:#f8fbff;
padding:20px;
border-radius:25px;
}

iframe{
width:100%;
height:650px;
border:none;
border-radius:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<h1>MedLearn</h1>
<p>Medical learning platform for students</p>

<div class="med-cards">
<div class="med-card">🫀 Heart</div>
<div class="med-card">🧠 Brain</div>
<div class="med-card">🦴 Anatomy</div>
<div class="med-card">📚 Quiz</div>
</div>

<button onclick="goQuiz()">Start Quiz</button>

</div>

<!-- QUIZ -->
<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">

<div id="badge" class="badge green">EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>

</div>

<p>Score: <span id="score">0</span></p>

<button onclick="restart()">Restart Quiz</button>
<button onclick="goAnatomy()">Go to Anatomy</button>

</section>

<!-- ANATOMY -->
<section id="anatomy">

<h2 style="font-size:48px;color:#d90429;">🫀 Anatomy Explorer</h2>

<div class="anatomy-card">

<div class="model-box">
<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<div class="model-box">
<h3>Heart</h3>
<iframe src="https://sketchfab.com/models/775d6629622740de8a5ed61a959c7506/embed"></iframe>
</div>

<div class="model-box">
<h3>Complete Anatomy</h3>
<iframe src="https://sketchfab.com/3d-models/complete-human-anatomy-c904a5a65ae145a0bc535645c7e693af/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli allow oxygen and CO2 exchange through diffusion."},
{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"Heart pumps blood through the entire body."},
{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephron filters blood and produces urine."},

{q:"RBC carries?",a:["Oxygen","Sugar","Fat","CO2 only"],c:0,e:"Hemoglobin carries oxygen efficiently."},
{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"Skin protects the body and regulates temperature."},

{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Controls blood glucose levels."},
{q:"Arteries carry?",a:["Away from heart","To heart","Both","None"],c:0,e:"Carry oxygenated blood away."},
{q:"Veins carry?",a:["To heart","Away","Only oxygen","None"],c:0,e:"Return blood to heart."},
{q:"Lungs function?",a:["Gas exchange","Digestion","Filtering","Movement"],c:0,e:"Exchange oxygen and CO2."},
{q:"Brain controls?",a:["Body","Heart","Liver","Nothing"],c:0,e:"Controls all body functions."},

{q:"SA node?",a:["Pacemaker","Filter","Pump","Valve"],c:0,e:"Controls heartbeat rhythm."},
{q:"Platelets?",a:["Clotting","Oxygen","Hormones","Digestion"],c:0,e:"Help blood clot."},
{q:"Liver?",a:["Detox","Breathing","Movement","Vision"],c:0,e:"Removes toxins."},
{q:"Neuron?",a:["Signal","Blood","Fat","Gas"],c:0,e:"Transmits nerve signals."},
{q:"Cerebellum?",a:["Balance","Vision","Digestion","Speech"],c:0,e:"Controls balance and coordination."},

{q:"CNS includes?",a:["Brain+spine","Heart","Lungs","Muscles"],c:0,e:"Central nervous system."},
{q:"Hemoglobin?",a:["Oxygen","Sugar","Fat","Water"],c:0,e:"Carries oxygen in blood."},
{q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,e:"Lives around 120 days."},
{q:"Diffusion?",a:["Movement","Pump","Active transport","Digestion"],c:0,e:"Passive movement of particles."},
{q:"Insulin?",a:["Sugar control","Breathing","Movement","Vision"],c:0,e:"Lowers blood glucose."},

{q:"Urea formed?",a:["Liver","Kidney","Heart","Lung"],c:0,e:"Produced in liver."},
{q:"Pulmonary flow?",a:["Heart-lung-heart","Heart-body-heart","Lung-brain-heart","None"],c:0,e:"Blood oxygenation cycle."},
{q:"Nephron?",a:["Filtration","Digestion","Movement","Breathing"],c:0,e:"Filters blood in kidneys."},
{q:"Oxygen binds?",a:["Hemoglobin","Plasma","Platelets","DNA"],c:0,e:"Binds to iron in hemoglobin."},
{q:"Vein pressure?",a:["Low","High","Equal","None"],c:0,e:"Veins have low pressure."},

{q:"Skin function?",a:["Protection","Digestion","Respiration","Blood"],c:0,e:"Protects body from environment."}
];

let i=0;
let score=0;
let timer;

function shuffle(arr){
return arr.map(a=>({a,r:Math.random()}))
.sort((x,y)=>x.r-y.r)
.map(x=>x.a);
}

/* EASY MED HARD */
function setBadge(){
let b=document.getElementById("badge");

if(i<10){
b.innerText="🟢 EASY";
b.className="badge green";
}
else if(i<20){
b.innerText="🟡 MEDIUM";
b.className="badge yellow";
}
else{
b.innerText="🔴 HARD";
b.className="badge red";
}
}

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

function load(){

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;

setBadge();

let answers=q.a.map((a,idx)=>({t:a,c:idx===q.c}));
answers=shuffle(answers);

let html="";
answers.forEach(a=>{
html+=`<div class="option" onclick="answer(${a.c})">${a.t}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";

clearTimeout(timer);
timer=setTimeout(next,10000);
}

function answer(correct){

if(correct){
score++;
document.getElementById("score").innerText=score;
}

document.getElementById("explanation").innerText=quiz[i].e;

document.querySelectorAll(".option").forEach(o=>o.style.pointerEvents="none");

clearTimeout(timer);
setTimeout(next,2000);
}

function next(){
i++;

if(i>=quiz.length){
i=0;
score=0;
document.getElementById("score").innerText=0;
}

load();
}

function restart(){
i=0;
score=0;
document.getElementById("score").innerText=0;
load();
}

window.onload=load;

</script>

</body>
</html>
