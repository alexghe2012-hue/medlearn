```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;

background: linear-gradient(180deg,#f5f7ff 0%,#e8f0ff 50%,#fff3f3 100%);

scroll-snap-type:y mandatory;
overflow-y:scroll;
scroll-behavior:smooth;
}

section{
height:100vh;
scroll-snap-align:start;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:30px;
text-align:center;
}

/* 🔴 BIG TITLE */
h1{
color:#e31212;
font-size:90px;
margin:0;
font-weight:900;
letter-spacing:2px;
}

h2{
font-size:40px;
}

/* buttons */
button{
padding:14px 22px;
border:none;
border-radius:12px;
background:#e31212;
color:white;
cursor:pointer;
margin:5px;
font-size:16px;
}

/* 🧠 BIGGER QUIZ CARD */
.card{
background:white;
padding:30px;
border-radius:25px;
width:500px;
box-shadow:0 10px 35px rgba(0,0,0,0.12);
}

/* options */
.option{
background:#f3f3f3;
padding:14px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

/* explanation BIGGER */
#explanation{
margin-top:15px;
font-size:15px;
color:#444;
min-height:60px;
line-height:1.4;
}

/* 🫀 ANATOMY BIG SECTION */
.anatomy-box{
background:white;
padding:30px;
border-radius:25px;
width:800px;
box-shadow:0 10px 35px rgba(0,0,0,0.12);
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:15px;
}
</style>
</head>

<body>

<!-- HOME -->
<section>
<h1>🫀 MED LEARN</h1>
<p>Medical learning platform — Quiz + Anatomy + Progress</p>
<button onclick="startQuiz()">Start Quiz</button>
</section>

<!-- QUIZ -->
<section>
<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">
<div id="question">Loading...</div>
<div id="options"></div>
<div id="explanation"></div>
</div>

<p>Score: <span id="score">0</span></p>

<button onclick="restart()">Restart</button>
</section>

<!-- ANATOMY -->
<section>
<h2>🫀 Anatomy</h2>

<div class="anatomy-box">

<p>
🔗 Extra model:
</p>

<p>
<a href="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d" target="_blank">
Open Circulatory System 3D Model
</a>
</p>

<p>Interactive 3D Heart Model</p>

<iframe src="https://sketchfab.com/models/775d6629622740de8a5ed61a959c7506/embed"></iframe>

</div>
</section>

<script>

/* ================= QUIZ ================= */

const quiz = [
{q:"Where does gas exchange occur?",a:["Alveoli","Trachea","Heart","Liver"],c:0,e:"Gas exchange occurs in alveoli. These tiny air sacs in the lungs have extremely thin walls and are surrounded by capillaries, allowing oxygen and carbon dioxide to diffuse efficiently between air and blood."},

{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"The heart is a muscular pump that circulates blood throughout the entire body, delivering oxygen and nutrients to tissues and removing waste products."},

{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"The nephron is the functional unit of the kidney, responsible for filtering blood, removing waste, and producing urine through processes like filtration, reabsorption, and secretion."},

{q:"RBC carries?",a:["Oxygen","Glucose","Waste","Hormones"],c:0,e:"Red blood cells carry oxygen using hemoglobin, a protein that binds oxygen in the lungs and delivers it to tissues throughout the body."},

{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"The skin is the largest organ of the human body. It protects internal organs, regulates temperature, and acts as a barrier against pathogens."},

{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Insulin is produced by the pancreas. It regulates blood glucose levels by allowing cells to absorb sugar from the bloodstream."},

{q:"Arteries carry blood?",a:["Away from heart","To heart","Random","Only oxygen"],c:0,e:"Arteries carry blood away from the heart under high pressure, usually oxygen-rich blood (except pulmonary arteries)."},

{q:"Veins carry blood?",a:["To heart","Away","Only oxygen","Only CO2"],c:0,e:"Veins return blood to the heart. They often contain valves to prevent backflow, especially in the limbs."},

{q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,e:"The lungs are responsible for gas exchange, bringing oxygen into the blood and removing carbon dioxide through breathing."},

{q:"Brain controls?",a:["Body","Only heart","Only lungs","Nothing"],c:0,e:"The brain is the control center of the body, regulating movement, thought, emotions, and vital functions like breathing and heartbeat."},

/* MEDIUM */
{q:"Functional kidney unit?",a:["Nephron","Neuron","Alveolus","Lobule"],c:0,e:"The nephron filters blood and maintains fluid and electrolyte balance in the body through urine formation."},

{q:"SA node function?",a:["Pacemaker","Filter","Pump","Sensor"],c:0,e:"The SA node is the natural pacemaker of the heart, generating electrical impulses that control heartbeat rhythm."},

{q:"Platelets function?",a:["Clotting","Oxygen","Hormones","Digestion"],c:0,e:"Platelets help blood clot by forming plugs at injury sites and activating clotting factors."},

{q:"Liver function?",a:["Detox","Breathing","Movement","Vision"],c:0,e:"The liver detoxifies harmful substances, produces bile for digestion, and stores nutrients like glycogen."},

{q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,e:"Digestion begins in the mouth where chewing and saliva enzymes start breaking down food."},

{q:"Neuron function?",a:["Signal","Blood flow","Digestion","Clotting"],c:0,e:"Neurons transmit electrical and chemical signals throughout the nervous system."},

{q:"Hemoglobin carries?",a:["Oxygen","Glucose","Fat","Hormones"],c:0,e:"Hemoglobin in red blood cells binds oxygen and transports it from the lungs to body tissues."},

{q:"Cerebellum controls?",a:["Balance","Vision","Digestion","Speech only"],c:0,e:"The cerebellum controls balance, posture, and coordination of movements."},

{q:"Blood pressure highest in?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,e:"Blood pressure is highest in arteries because they receive blood directly from the heart."},

{q:"CNS includes?",a:["Brain + spinal cord","Nerves","Heart","Muscles"],c:0,e:"The central nervous system includes the brain and spinal cord, controlling all body functions."},

/* HARD */
{q:"Heart pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,e:"The SA node initiates electrical impulses that start each heartbeat."},

{q:"Urea formed in?",a:["Liver","Kidney","Heart","Lung"],c:0,e:"Urea is produced in the liver as a waste product of protein metabolism."},

{q:"Pulmonary circulation?",a:["Heart-lungs-heart","Heart-body-heart","Lungs-brain-heart","Heart-liver"],c:0,e:"Pulmonary circulation carries deoxygenated blood from the heart to the lungs and back oxygenated."},

{q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,e:"Red blood cells live about 120 days before being replaced by the bone marrow."},

{q:"Gas exchange driven by?",a:["Diffusion","Active transport","Osmosis","Filtration"],c:0,e:"Gas exchange occurs by diffusion, moving gases from high to low concentration."},

{q:"Blood glucose hormone?",a:["Insulin","Adrenaline","Thyroxine","Melatonin"],c:0,e:"Insulin lowers blood glucose by helping cells absorb sugar."},

{q:"Nephron function?",a:["Filtration","Digestion","Movement","Oxygen"],c:0,e:"Nephrons filter blood and produce urine by removing waste and excess substances."},

{q:"Oxygen binds to?",a:["Hemoglobin iron","Plasma","Platelets","DNA"],c:0,e:"Oxygen binds to iron in hemoglobin inside red blood cells."},

{q:"Veins pressure?",a:["Low","High","Equal","None"],c:0,e:"Veins carry blood under low pressure and rely on valves and muscle movement."},

{q:"Skin function?",a:["Protection","Digestion","Respiration","Circulation"],c:0,e:"The skin protects the body from injury, infection, and water loss while regulating temperature."}
];

let i = 0;
let score = 0;

function load(){

let q = quiz[i];

document.getElementById("qnr").innerText = i+1;
document.getElementById("question").innerText = q.q;

let html = "";

q.a.forEach((ans,idx)=>{
html += `<div class="option" onclick="answer(${idx})">${ans}</div>`;
});

document.getElementById("options").innerHTML = html;
document.getElementById("explanation").innerText = "";
}

function answer(x){

let q = quiz[i];

if(x === q.c){
score++;
document.getElementById("score").innerText = score;
}

document.getElementById("explanation").innerText = q.e;

document.querySelectorAll(".option").forEach(o=>{
o.style.pointerEvents="none";
});

setTimeout(()=>{
i++;

if(i >= quiz.length){
alert("Final Score: " + score + "/30");
i = 0;
score = 0;
document.getElementById("score").innerText = 0;
}

load();
},1200);
}

function restart(){
i = 0;
score = 0;
document.getElementById("score").innerText = 0;
load();
}

function startQuiz(){
document.querySelectorAll("section")[1].scrollIntoView({behavior:"smooth"});
load();
}

window.onload = load;

</script>

</body>
</html>
