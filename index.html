<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn Pro Max</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
color:#111827;
}

header{
background:#e11d48;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

nav{
display:flex;
gap:10px;
padding:10px;
background:white;
border-bottom:1px solid #e5e7eb;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#111827;
color:white;
}

.container{padding:20px;}

.card{
background:white;
padding:15px;
border-radius:12px;
border:1px solid #e5e7eb;
margin-bottom:10px;
}

.small{color:#6b7280;}

.page{display:none;}
.active{display:block;}
</style>
</head>

<body>

<header>
🫀 MedLearn PRO MAX
</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('quiz')">Quiz</button>
<button onclick="show('anat')">3D Anatomy</button>
</nav>

<!-- ================= HOME ================= -->
<div class="container">

<div id="home" class="page active">

<div class="card">
<h2 id="title">Welcome</h2>
<p id="desc">Medical learning platform</p>
</div>

<div class="card">
<h3>📊 Student Progress</h3>
<p>XP: <span id="xp">0</span></p>
<button onclick="addXP()">Gain XP</button>
</div>

</div>
<!-- QUIZ -->
<div id="quiz" class="page">

<div class="card">
<h2>🧠 Medical Quiz</h2>

<div id="q"></div>
<div id="opts"></div>

<p id="res"></p>
<p>Score: <span id="score">0</span></p>

<button onclick="nextQ()">Next</button>
</div>

</div>
<!-- ANATOMY -->
<div id="anat" class="page">

<div class="card">
<h2>🫀 3D Anatomy</h2>
<div id="scene" style="height:400px;background:black;border-radius:12px;"></div>
<p id="info">Click organ</p>
</div>

</div>

</div>

<script>

/* ================= STATE ================= */
let xp=0;
let score=0;
let i=0;

/* ================= LANG ================= */
const t={
en:{title:"Welcome",desc:"Medical platform"},
ro:{title:"Bine ai venit",desc:"Platformă medicală"},
fr:{title:"Bienvenue",desc:"Plateforme médicale"}
};

/* ================= QUIZ ================= */
const quiz=[
{q:"Heart function?",o:["Pump blood","Digest","Breathe"],a:0},
{q:"Lungs do?",o:["Gas exchange","Filter blood","Think"],a:0},
{q:"Kidneys?",o:["Filter blood","Pump blood","Vision"],a:0}
];

/* ================= NAV ================= */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= XP ================= */
function addXP(){
xp+=10;
document.getElementById("xp").innerText=xp;
}

/* ================= QUIZ ================= */
function load(){
let q=quiz[i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((o,idx)=>{
html+=`<div onclick="ans(${idx})" class="card">${o}</div>`;
});

document.getElementById("opts").innerHTML=html;
}

function ans(x){
if(x===quiz[i].a){
score++;
document.getElementById("res").innerText="Correct";
}else{
document.getElementById("res").innerText="Wrong";
}
document.getElementById("score").innerText=score;
}

function nextQ(){
i++;
if(i>=quiz.length) i=0;
load();
}

/* ================= 3D (REAL ENGINE READY) ================= */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,1,0.1,1000);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(400,400);
document.getElementById("scene").appendChild(renderer.domElement);

/* BODY MODEL (placeholder now, real GLTF next step) */
const body=new THREE.Mesh(
new THREE.SphereGeometry(1,32,32),
new THREE.MeshBasicMaterial({color:0xe11d48,wireframe:true})
);

scene.add(body);
camera.position.z=3;

function animate(){
requestAnimationFrame(animate);
body.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();

document.getElementById("scene").addEventListener("click",()=>{
document.getElementById("info").innerText="Heart clicked (demo)";
});

/* INIT */
load();

</script>

</body>
</html>
