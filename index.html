<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* QUIZ */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
font-size:18px;
color:#333;
line-height:1.8;
font-weight:500;
min-height:200px;
}

/* BULINE DIFICULTATE */
#badge{
position:absolute;
top:-15px;
left:-15px;
padding:8px 14px;
border-radius:20px;
font-size:13px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}

.button-row{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:20px;
}

.row{
display:flex;
gap:15px;
}

/* ANATOMY */
.anatomy-card{
background:white;
padding:50px;
border-radius:30px;
width:95%;
max-width:1400px;
box-shadow:0 20px 60px rgba(0,0,0,0.18);
display:flex;
flex-direction:column;
gap:70px;
}

iframe{
width:100%;
height:800px;
border:none;
border-radius:25px;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start</button>
</div>

<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">

<div id="badge" class="green">🟢 EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>

</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

<div class="button-row">
<div class="row">
<button onclick="next()">NEXT</button>
<button onclick="restart()">RESTART</button>
</div>
<div class="row">
<button onclick="goAnatomy()">ANATOMY</button>
</div>
</div>

</section>

<section id="anatomy">

<h2 style="font-size:60px;color:#d90429;">🫀 Anatomy</h2>

<div class="anatomy-card">

<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>

<h3>Heart</h3>
<iframe src="https://sketchfab.com/3d-models/heart-anatomy-and-functions-2e6726aca3e64c56b8f8d7cceae17a28/embed"></iframe>

<h3>Human Organs</h3>
<iframe src="https://sketchfab.com/3d-models/human-anatomy-organs-pack-7fd440196fe3480587de330967737848/embed"></iframe>

</div>
</section>

<script>

const quiz = [

/* 🟢 EASY (1–10) */
{d:"EASY",q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,
e:"Gas exchange takes place in the alveoli, which are tiny air sacs in the lungs surrounded by capillaries. Oxygen diffuses into blood while carbon dioxide is removed. This process is essential for cellular respiration because oxygen is needed for ATP production in every cell of the body."},

{d:"EASY",q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,
e:"The heart is a muscular pump that circulates blood throughout the body. It ensures oxygen and nutrients reach tissues and removes waste products like carbon dioxide. It works continuously through electrical impulses that coordinate contractions."},

{d:"EASY",q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,
e:"The nephron is the functional unit of the kidney responsible for filtering blood, removing waste, balancing water and electrolytes, and maintaining homeostasis through filtration, reabsorption, and secretion."},

{d:"EASY",q:"RBC carries?",a:["Oxygen","Sugar","Fat","Hormones"],c:0,
e:"Red blood cells carry oxygen using hemoglobin, a protein containing iron. Oxygen binds in the lungs and is released in tissues where it is needed for energy production."},

{d:"EASY",q:"Skin function?",a:["Protection","Digestion","Respiration","Circulation"],c:0,
e:"Skin protects the body from pathogens, prevents water loss, regulates temperature through sweating, and contains sensory receptors for touch and pain."},

{d:"EASY",q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,
e:"The brain controls all voluntary and involuntary functions, including movement, breathing, memory, emotions, and organ activity through the nervous system."},

{d:"EASY",q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,
e:"The lungs are responsible for gas exchange, bringing oxygen into the blood and removing carbon dioxide during respiration."},

{d:"EASY",q:"Arteries carry?",a:["Away from heart","To heart","Both","None"],c:0,
e:"Arteries carry oxygenated blood away from the heart under high pressure to supply organs and tissues."},

{d:"EASY",q:"Veins carry?",a:["To heart","Away","Oxygen only","CO2 only"],c:0,
e:"Veins return deoxygenated blood back to the heart and contain valves to prevent backflow."},

{d:"EASY",q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,
e:"The skin is the largest organ of the human body and acts as a protective barrier against external threats."},

/* 🟡 MEDIUM (11–20) */
{d:"MEDIUM",q:"SA node?",a:["Pacemaker","Filter","Pump","Valve"],c:0,
e:"The SA node is the natural pacemaker of the heart. It generates electrical impulses that control heartbeat rhythm and ensure coordinated contraction of heart chambers."},

{d:"MEDIUM",q:"Platelets?",a:["Clotting","Oxygen","Digestion","Hormones"],c:0,
e:"Platelets are responsible for blood clotting. They form plugs at injury sites and activate clotting proteins to prevent bleeding."},

{d:"MEDIUM",q:"Liver function?",a:["Detox","Breathing","Movement","Vision"],c:0,
e:"The liver detoxifies harmful substances, produces bile for fat digestion, stores glycogen for energy, and synthesizes important proteins."},

{d:"MEDIUM",q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,
e:"Digestion starts in the mouth where food is mechanically broken and chemically processed by saliva enzymes like amylase."},

{d:"MEDIUM",q:"Neuron?",a:["Signal","Blood","Digestion","Clotting"],c:0,
e:"Neurons transmit electrical and chemical signals through synapses, enabling communication between brain and body."},

{d:"MEDIUM",q:"Hemoglobin?",a:["Oxygen","Sugar","Fat","Water"],c:0,
e:"Hemoglobin is the protein in red blood cells that binds oxygen for transport from lungs to tissues."},

{d:"MEDIUM",q:"Cerebellum?",a:["Balance","Vision","Digestion","Breathing"],c:0,
e:"The cerebellum controls balance, posture, and coordination of movements."},

{d:"MEDIUM",q:"Pressure highest?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,
e:"Blood pressure is highest in arteries because blood is pumped directly from the heart under force."},

{d:"MEDIUM",q:"CNS?",a:["Brain+spine","Nerves","Muscles","Heart"],c:0,
e:"The central nervous system includes the brain and spinal cord, responsible for processing and sending signals."},

{d:"MEDIUM",q:"Pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,
e:"The SA node initiates electrical impulses that control heart rhythm."},

/* 🔴 HARD (21–30) */
{d:"HARD",q:"Nephron?",a:["Filtration","Digestion","Movement","Oxygen"],c:0,
e:"The nephron performs filtration, reabsorption, and secretion to regulate water, salts, and waste, maintaining internal balance of the body."},

{d:"HARD",q:"Oxygen binds?",a:["Hemoglobin iron","Plasma","Platelets","DNA"],c:0,
e:"Oxygen binds to iron in hemoglobin inside red blood cells, allowing efficient transport through the bloodstream."},

{d:"HARD",q:"Veins pressure?",a:["Low","High","Medium","None"],c:0,
e:"Veins operate under low pressure and rely on valves and muscle contractions to return blood to the heart."},

{d:"HARD",q:"CNS?",a:["Brain+spine","Nerves","Muscles","Heart"],c:0,
e:"The CNS controls all body functions and processes information from sensory inputs to generate responses."},

{d:"HARD",q:"Urea formed?",a:["Liver","Kidney","Heart","Lungs"],c:0,
e:"The liver converts toxic ammonia into urea, which is then excreted by the kidneys."},

{d:"HARD",q:"Diffusion?",a:["Passive movement","Active pump","Muscle force","Heartbeat"],c:0,
e:"Diffusion is the passive movement of particles from high concentration to low concentration without energy."},

{d:"HARD",q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,
e:"Red blood cells live about 120 days before being removed and recycled by the spleen and liver."},

{d:"HARD",q:"Pulmonary circulation?",a:["Heart-lungs-heart","Heart-body-heart","Brain-heart","Liver-heart"],c:0,
e:"Pulmonary circulation carries blood from the heart to the lungs for oxygenation and back to the heart."},

{d:"HARD",q:"Skin role?",a:["Protection","Digestion","Respiration","Circulation"],c:0,
e:"Skin protects the body, regulates temperature, prevents dehydration, and acts as a sensory organ."},

{d:"HARD",q:"Neurons do?",a:["Transmit signals","Store fat","Make blood","Digest food"],c:0,
e:"Neurons transmit electrical and chemical signals throughout the nervous system for communication."}

];

let i=0;
let score=0;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function setBadge(){
let b=document.getElementById("badge");

if(quiz[i].d==="EASY"){
b.innerText="🟢 EASY";
b.className="green";
}
else if(quiz[i].d==="MEDIUM"){
b.innerText="🟡 MEDIUM";
b.className="yellow";
}
else{
b.innerText="🔴 HARD";
b.className="red";
}
}

function load(){
let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;
document.getElementById("score").innerText=score;

setBadge();

let html="";
q.a.forEach((a,idx)=>{
html+=`<div class="option" onclick="answer(${idx})">${a}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";
}

function answer(idx){
if(idx===quiz[i].c){
score++;
document.getElementById("score").innerText=score;
}
document.getElementById("explanation").innerText=quiz[i].e;
}

function next(){
if(i<quiz.length-1){
i++;
load();
}else{
alert("Final Score: "+score+"/30");
i=0;
score=0;
load();
}
}

function restart(){
i=0;
score=0;
load();
}
</script>

</body>
</html>
