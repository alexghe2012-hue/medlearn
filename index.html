<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;

background:
linear-gradient(135deg,#eef7ff 0%,#dcefff 30%,#f4f8ff 60%,#ffe9e9 100%);

scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:110px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#444;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:25px;
width:520px;
box-shadow:0 10px 35px rgba(0,0,0,0.12);
position:relative;
}

.option{
background:#f3f3f3;
padding:14px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#explanation{
margin-top:15px;
font-size:15px;
color:#444;
min-height:90px;
line-height:1.4;
}

/* BULINE */
.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31212;
color:white;
cursor:pointer;
margin:6px;
}

.anatomy-card{
background:white;
padding:35px;
border-radius:30px;
width:95%;
max-width:1200px;
box-shadow:0 15px 45px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
gap:30px;
}

.model-box{
background:#f8fbff;
padding:20px;
border-radius:25px;
}

iframe{
width:100%;
height:650px;
border:none;
border-radius:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>

<button onclick="goQuiz()">Start Quiz</button>
</div>

<!-- QUIZ -->
<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">

<div id="badge" class="badge green">EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>

</div>

<p>Score: <span id="score">0</span></p>

<button onclick="goAnatomy()">Go to Anatomy</button>
</section>

<!-- ANATOMY -->
<section id="anatomy">

<h2 style="font-size:48px;color:#d90429;">🫀 Anatomy Explorer</h2>

<div class="anatomy-card">

<div class="model-box">
<h3>Circulatory System</h3>
<iframe src="https://sketchfab.com/models/775d6629622740de8a5ed61a959c7506/embed"></iframe>
</div>

<div class="model-box">
<h3>Human Body (Circulatory + Animation)</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{q:"Where does gas exchange occur?",a:["Alveoli","Trachea","Heart","Liver"],c:0,
e:"Gas exchange happens in alveoli where oxygen enters blood through diffusion and carbon dioxide is removed efficiently."},

{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,
e:"The heart is a muscular pump that circulates blood continuously through arteries and veins."},

{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,
e:"The nephron filters blood, regulates water balance and removes waste through urine formation."}
];

let i=0;
let score=0;
let timer;

/* shuffle */
function shuffle(arr){
return arr.map(a=>({a, r:Math.random()}))
.sort((x,y)=>x.r-y.r)
.map(x=>x.a);
}

/* badge difficulty */
function setBadge(){
let b=document.getElementById("badge");

if(i<1){
b.innerText="EASY";
b.className="badge green";
}
else if(i<2){
b.innerText="MEDIUM";
b.className="badge yellow";
}
else{
b.innerText="HARD";
b.className="badge red";
}
}

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

function load(){

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;

setBadge();

let answers=q.a.map((a,idx)=>({t:a,c:idx===q.c}));
answers=shuffle(answers);

let html="";
answers.forEach(a=>{
html+=`<div class="option" onclick="answer(${a.c})">${a.t}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";

clearTimeout(timer);
timer=setTimeout(next,10000);
}

function answer(correct){

if(correct){
score++;
document.getElementById("score").innerText=score;
}

document.getElementById("explanation").innerText=quiz[i].e;

document.querySelectorAll(".option").forEach(o=>o.style.pointerEvents="none");

clearTimeout(timer);

/* auto next (NO button) */
setTimeout(next,2000);
}

function next(){
i++;

if(i>=quiz.length){
alert("Final Score: "+score+"/30");
i=0;
score=0;
document.getElementById("score").innerText=0;
}

load();
}

window.onload=load;

</script>

</body>
</html>
