<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn V6</title>

<style>
body{
margin:0;
font-family:Arial;
background:#ffffff;
color:#111827;
}

/* HEADER */
header{
background:#e11d48;
color:white;
padding:15px;
text-align:center;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #e5e7eb;
}

/* BUTTONS */
button{
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#111827;
color:white;
}

/* LAYOUT */
.container{
display:flex;
gap:20px;
padding:20px;
}

/* LEFT PANEL */
.left{
flex:1;
}

/* RIGHT PANEL (info panel) */
.right{
width:300px;
border-left:1px solid #e5e7eb;
padding-left:15px;
}

/* CARD */
.card{
border:1px solid #e5e7eb;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

/* ANATOMY IMAGE */
.anatomy{
position:relative;
width:100%;
max-width:400px;
}

.anatomy img{
width:100%;
border-radius:12px;
}

/* HOTSPOTS */
.hotspot{
position:absolute;
width:18px;
height:18px;
background:red;
border-radius:50%;
cursor:pointer;
}

/* POSITIONS */
#h{top:45%;left:48%;}
#b{top:15%;left:48%;}
#l{top:40%;left:35%;}
#lv{top:55%;left:50%;}
#k{top:60%;left:60%;}

/* LANG SELECT */
.lang{
display:flex;
gap:5px;
}
</style>
</head>

<body>

<header>
🫀 MedLearn STARTUP V6
</header>

<div class="topbar">
<div class="lang">
<button onclick="setLang('ro')">RO</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
</div>

<button onclick="login()">Login (Firebase later)</button>
</div>

<div class="container">

<!-- ================= LEFT ================= -->
<div class="left">

<div class="card">
<h2 id="title">Medical App</h2>
<p id="desc">Study anatomy, track progress, learn medicine.</p>
</div>

<!-- ANATOMY -->
<div class="card">
<h3>🫀 Anatomy Atlas</h3>

<div class="anatomy">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Heart_anterior_exterior_view.jpg">

<div class="hotspot" id="h" onclick="showInfo('Heart - pumps blood')"></div>
<div class="hotspot" id="b" onclick="showInfo('Brain - controls body')"></div>
<div class="hotspot" id="l" onclick="showInfo('Lungs - breathing')"></div>
<div class="hotspot" id="lv" onclick="showInfo('Liver - detox')"></div>
<div class="hotspot" id="k" onclick="showInfo('Kidneys - filter blood')"></div>

</div>
</div>

</div>

<!-- ================= RIGHT ================= -->
<div class="right">

<h3>📊 Info Panel</h3>

<div class="card" id="infoBox">
Click on an organ
</div>

<div class="card">
<h3>🧠 AI Medical Mode</h3>
<p>Ask symptoms → get explanation (demo)</p>
<input id="symptom" placeholder="e.g. chest pain">
<button onclick="ai()">Analyze</button>
<p id="aiOut"></p>
</div>

</div>

</div>

<script>

/* ================= LANGUAGE ================= */
let lang="en";

const t={
en:{title:"Medical App",desc:"Study anatomy and medicine"},
ro:{title:"Aplicație Medicală",desc:"Studiază anatomia și medicina"},
fr:{title:"Application Médicale",desc:"Étudier la médecine"}
};

function setLang(l){
lang=l;
document.getElementById("title").innerText=t[l].title;
document.getElementById("desc").innerText=t[l].desc;
}

/* ================= ANATOMY INFO ================= */
function showInfo(text){
document.getElementById("infoBox").innerText=text;
}

/* ================= AI MODE (SIMULAT) ================= */
function ai(){
let s=document.getElementById("symptom").value.toLowerCase();
let out="";

if(s.includes("chest")){
out="Possible cardiac issue → consult cardiology";
}
else if(s.includes("head")){
out="Possible neurological issue";
}
else if(s.includes("pain")){
out="General symptom → needs evaluation";
}
else{
out="No data available";
}

document.getElementById("aiOut").innerText=out;
}

/* ================= LOGIN (placeholder) ================= */
function login(){
alert("Firebase login will be added next step");
}

</script>

</body>
</html>
