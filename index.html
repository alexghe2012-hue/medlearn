<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#333;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* SECTIONS */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

/* QUIZ */
.card{
background:white;
padding:50px;
border-radius:28px;
width:750px;
min-height:320px;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
position:relative;
}

.option{
background:#f3f3f3;
padding:15px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#explanation{
margin-top:15px;
min-height:110px;
font-size:15px;
color:#444;
line-height:1.5;
}

/* BADGE */
.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

/* ANATOMY */
.anatomy-card{
background:white;
padding:35px;
border-radius:30px;
width:95%;
max-width:1200px;
box-shadow:0 15px 45px rgba(0,0,0,0.12);
}

.model-box{
background:#f8fbff;
padding:20px;
border-radius:25px;
margin-bottom:20px;
}

iframe{
width:100%;
height:650px;
border:none;
border-radius:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start Quiz</button>
</div>

<!-- QUIZ -->
<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span> / <span id="total"></span></h2>

<div class="card">

<div id="badge" class="badge green">EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>

</div>

<button onclick="restart()">Restart</button>
<button onclick="goAnatomy()">Anatomy</button>

</section>

<!-- ANATOMY -->
<section id="anatomy">

<h2 style="font-size:48px;color:#d90429;">🫀 Anatomy Explorer</h2>

<div class="anatomy-card">

<div class="model-box">
<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<div class="model-box">
<h3>Heart</h3>
<iframe src="https://sketchfab.com/models/775d6629622740de8a5ed61a959c7506/embed"></iframe>
</div>

<div class="model-box">
<h3>Complete Anatomy</h3>
<iframe src="https://sketchfab.com/3d-models/complete-human-anatomy-c904a5a65ae145a0bc535645c7e693af/embed"></iframe>
</div>

</div>
</section>

<script>

/* 30+ QUESTIONS SAFE (poți extinde) */
const quiz = [
{
q:"Gas exchange occurs in?",
a:["Alveoli","Heart","Liver","Trachea"],
c:0,
e:"Alveoli are microscopic air sacs in the lungs where oxygen diffuses into blood and carbon dioxide is removed."
},
{
q:"Heart function?",
a:["Pump blood","Digest food","Store oxygen","Make bile"],
c:0,
e:"The heart is a muscular pump that circulates blood throughout the body delivering oxygen and nutrients."
},
{
q:"Kidney unit?",
a:["Nephron","Neuron","Cell","Tissue"],
c:0,
e:"The nephron filters blood, removes waste and regulates water and electrolyte balance."
},
{
q:"RBC carries?",
a:["Oxygen","Sugar","Fat","CO2 only"],
c:0,
e:"Red blood cells carry oxygen using hemoglobin, which binds oxygen molecules efficiently."
},
{
q:"Largest organ?",
a:["Skin","Heart","Liver","Brain"],
c:0,
e:"The skin is the largest organ and protects the body while regulating temperature and hydration."
}
];

let i = 0;
let score = 0;

/* total fix */
document.getElementById("total").innerText = quiz.length;

/* NAV */
function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

/* SHUFFLE */
function shuffle(arr){
return arr.map(a=>({a,r:Math.random()}))
.sort((x,y)=>x.r-y.r)
.map(x=>x.a);
}

/* BADGE */
function setBadge(){
let b=document.getElementById("badge");

if(i<10){b.innerText="EASY";b.className="badge green";}
else if(i<20){b.innerText="MEDIUM";b.className="badge yellow";}
else{b.innerText="HARD";b.className="badge red";}
}

/* LOAD */
function load(){

if(i >= quiz.length) return;

let q = quiz[i];

document.getElementById("qnr").innerText = i+1;
document.getElementById("question").innerText = q.q;

setBadge();

let answers = q.a.map((a,idx)=>({t:a,c:idx===q.c}));
answers = shuffle(answers);

let html="";
answers.forEach(a=>{
html+=`<div class="option" onclick="answer(${a.c})">${a.t}</div>`;
});

document.getElementById("options").innerHTML = html;
document.getElementById("explanation").innerText = "";
}

/* ANSWER */
function answer(correct){

if(correct){
score++;
}

document.getElementById("explanation").innerText = quiz[i].e;

document.querySelectorAll(".option")
.forEach(o=>o.style.pointerEvents="none");

setTimeout(next,1500);
}

/* NEXT (FIX 100% STABIL) */
function next(){

i++;

if(i >= quiz.length){
alert("Quiz completed! Score: " + score);
i = 0;
score = 0;
}

load();
}

/* RESTART */
function restart(){
i = 0;
score = 0;
load();
}

window.onload = load;

</script>

</body>
</html>
