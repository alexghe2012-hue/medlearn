<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* QUIZ */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
font-size:18px;
color:#333;
line-height:1.8;
font-weight:500;
min-height:200px;
}

/* BULINE DIFICULTATE */
#badge{
position:absolute;
top:-15px;
left:-15px;
padding:8px 14px;
border-radius:20px;
font-size:13px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}

.button-row{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:20px;
}

.row{
display:flex;
gap:15px;
}

/* ANATOMY */
.anatomy-card{
background:white;
padding:50px;
border-radius:30px;
width:95%;
max-width:1400px;
box-shadow:0 20px 60px rgba(0,0,0,0.18);
display:flex;
flex-direction:column;
gap:70px;
}

iframe{
width:100%;
height:800px;
border:none;
border-radius:25px;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start</button>
</div>

<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">

<div id="badge" class="green">🟢 EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>

</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

<div class="button-row">
<div class="row">
<button onclick="next()">NEXT</button>
<button onclick="restart()">RESTART</button>
</div>
<div class="row">
<button onclick="goAnatomy()">ANATOMY</button>
</div>
</div>

</section>

<section id="anatomy">

<h2 style="font-size:60px;color:#d90429;">🫀 Anatomy</h2>

<div class="anatomy-card">

<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>

<h3>Heart</h3>
<iframe src="https://sketchfab.com/3d-models/heart-anatomy-and-functions-2e6726aca3e64c56b8f8d7cceae17a28/embed"></iframe>

<h3>Human Organs</h3>
<iframe src="https://sketchfab.com/3d-models/human-anatomy-organs-pack-7fd440196fe3480587de330967737848/embed"></iframe>

</div>
</section>

<script>

const quiz = [

/* 🟢 EASY */
{d:"EASY",q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,
e:"Gas exchange occurs in the alveoli, which are microscopic air sacs located at the end of the bronchioles in the lungs. Their walls are extremely thin and surrounded by a dense network of capillaries. This structure allows oxygen to diffuse rapidly into the blood while carbon dioxide diffuses out. The process is essential for cellular respiration, because every cell in the body depends on oxygen to produce energy (ATP) through metabolism."},

{d:"EASY",q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,
e:"The heart is a muscular organ whose primary function is to pump blood continuously throughout the body. It works like a double pump: the right side sends blood to the lungs for oxygenation, while the left side sends oxygen-rich blood to the entire body. This continuous circulation ensures that every tissue receives oxygen and nutrients while waste products like carbon dioxide are removed."},

{d:"EASY",q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,
e:"The nephron is the functional unit of the kidney, and each kidney contains around one million nephrons. A nephron filters blood, removes waste substances, regulates water and electrolyte balance, and helps maintain blood pressure. It performs processes like filtration, reabsorption, and secretion, ensuring the body maintains a stable internal environment (homeostasis)."},

{d:"EASY",q:"RBC carries?",a:["Oxygen","Sugar","Fat","Hormones"],c:0,
e:"Red blood cells (RBCs) carry oxygen from the lungs to tissues using a special protein called hemoglobin. Hemoglobin contains iron, which binds oxygen molecules reversibly. This allows oxygen to be picked up in the lungs and released where it is needed in the body. RBCs also help transport a small amount of carbon dioxide back to the lungs."},

{d:"EASY",q:"Skin function?",a:["Protection","Digestion","Respiration","Circulation"],c:0,
e:"The skin is the largest organ of the human body and acts as a protective barrier against bacteria, viruses, and physical injury. It also prevents water loss, regulates body temperature through sweating, and contains sensory receptors that detect touch, pain, and temperature changes. Without skin, the body would quickly lose homeostasis and become vulnerable to infection."},

/* 🟡 MEDIUM */
{d:"MEDIUM",q:"SA node?",a:["Pacemaker","Filter","Pump","Valve"],c:0,
e:"The SA node (sinoatrial node) is a small group of specialized cells located in the right atrium of the heart. It acts as the natural pacemaker by generating electrical impulses that trigger each heartbeat. These impulses spread through the atria and then to the ventricles, ensuring the heart contracts in a coordinated and efficient rhythm necessary for proper blood circulation."},

{d:"MEDIUM",q:"Platelets?",a:["Clotting","Oxygen","Digestion","Hormones"],c:0,
e:"Platelets are small blood cell fragments that play a critical role in blood clotting. When a blood vessel is injured, platelets quickly gather at the site, stick together, and release chemicals that activate clotting factors. This forms a fibrin clot that stops bleeding and allows tissue repair to begin. Without platelets, even small injuries could lead to dangerous blood loss."},

{d:"MEDIUM",q:"Liver?",a:["Detox","Breathing","Movement","Vision"],c:0,
e:"The liver is a vital organ responsible for detoxifying harmful substances such as drugs and alcohol. It also produces bile, which helps digest fats, stores glucose in the form of glycogen, and produces essential proteins for blood clotting. It is one of the most metabolically active organs in the body, performing hundreds of biochemical processes."},

{d:"MEDIUM",q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,
e:"Digestion begins in the mouth, where mechanical breakdown occurs through chewing and chemical digestion begins with saliva. Saliva contains enzymes like amylase that start breaking down carbohydrates into simpler sugars. This early stage is essential because it prepares food for further digestion in the stomach and intestines."},

{d:"MEDIUM",q:"Neuron?",a:["Signal","Blood","Digestion","Clotting"],c:0,
e:"Neurons are specialized cells that transmit electrical and chemical signals throughout the nervous system. They communicate using electrical impulses along their axons and chemical neurotransmitters across synapses. This allows the brain to control movement, sensation, memory, and all bodily functions with extremely fast communication."},

/* 🔴 HARD */
{d:"HARD",q:"Nephron?",a:["Filtration","Digestion","Movement","Oxygen"],c:0,
e:"The nephron is a highly specialized structure that performs filtration, reabsorption, and secretion to form urine. Blood enters the glomerulus where filtration occurs, removing waste and excess substances. Useful molecules like glucose and water are reabsorbed back into the bloodstream, while toxins are secreted into the urine. This process is essential for maintaining fluid balance, electrolyte levels, and blood pressure."},
  
];

let i=0;
let score=0;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function setBadge(){
let b=document.getElementById("badge");

if(quiz[i].d==="EASY"){
b.innerText="🟢 EASY";
b.className="green";
}
else if(quiz[i].d==="MEDIUM"){
b.innerText="🟡 MEDIUM";
b.className="yellow";
}
else{
b.innerText="🔴 HARD";
b.className="red";
}
}

function load(){
let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;
document.getElementById("score").innerText=score;

setBadge();

let html="";
q.a.forEach((a,idx)=>{
html+=`<div class="option" onclick="answer(${idx})">${a}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";
}

function answer(idx){
if(idx===quiz[i].c){
score++;
document.getElementById("score").innerText=score;
}
document.getElementById("explanation").innerText=quiz[i].e;
}

function next(){
if(i<quiz.length-1){
i++;
load();
}else{
alert("Final Score: "+score+"/30");
i=0;
score=0;
load();
}
}

function restart(){
i=0;
score=0;
load();
}
</script>

</body>
</html>
