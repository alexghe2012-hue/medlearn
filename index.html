<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  text-align:center;
  padding:35px;
  background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  background:#111827;
  padding:10px;
  flex-wrap:wrap;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

section{display:none;padding:20px;}
.active{display:block;}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px auto;
  border-radius:12px;
  max-width:500px;
}

.option{
  background:#334155;
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}
.option:hover{background:#475569;}

.lang{
  position:absolute;
  top:10px;
  right:10px;
}

.small{
  opacity:0.8;
}

.heart{
  cursor:pointer;
  color:#f87171;
}
</style>
</head>

<body>

<header>
<h1 id="title">MedLearn</h1>
<p id="subtitle">Interactive Medical Learning Platform</p>

<div class="lang">
<button onclick="setLang('ro')">RO</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
</div>

</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('quiz')">Quiz</button>
<button onclick="show('anatomy')">Anatomy</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
<h2 id="welcome">Welcome 🚀</h2>
<p class="small" id="desc">Learn medicine step by step like a real student doctor.</p>
</section>

<!-- QUIZ -->
<section id="quiz">
<h2>🧠 Quiz</h2>

<div class="card">
<div id="question">What organ pumps blood?</div>

<div class="option" onclick="answer(false)">Lungs</div>
<div class="option" onclick="answer(true)">Heart</div>
<div class="option" onclick="answer(false)">Brain</div>

<p id="result"></p>
<p>Score: <span id="score">0</span></p>

<button onclick="restart()">Restart</button>
<button onclick="nextQuestion()">Next</button>
</div>
</section>

<!-- ANATOMY -->
<section id="anatomy">
<h2>🫀 Anatomy</h2>

<div class="card">
<h3 class="heart" onclick="alert(getText('heartInfo'))">❤️ Heart</h3>
<p class="small" id="heartText">Click for info</p>
</div>

<div class="card">
<h3>🫁 Lungs</h3>
<p class="small" id="lungText">Breathing system organ</p>
</div>

<div class="card">
<h3>🧠 Brain</h3>
<p class="small" id="brainText">Controls the body</p>
</div>
</section>

<script>

let score = 0;
let current = 0;

const questions = [
{
q:"What organ pumps blood?",
a:1
},
{
q:"What organ controls the body?",
a:2
},
{
q:"What organ helps breathing?",
a:0
}
];

const texts = {
ro:{
title:"MedLearn",
subtitle:"Platformă interactivă de medicină",
welcome:"Bine ai venit 🚀",
desc:"Învață medicină pas cu pas",
heart:"Inimă",
heartInfo:"Inima pompează sângele în corp.",
lung:"Plămâni",
brain:"Creier"
},
en:{
title:"MedLearn",
subtitle:"Interactive Medical Learning Platform",
welcome:"Welcome 🚀",
desc:"Learn medicine step by step",
heart:"Heart",
heartInfo:"The heart pumps blood through the body.",
lung:"Lungs",
brain:"Brain"
},
fr:{
title:"MedLearn",
subtitle:"Plateforme médicale interactive",
welcome:"Bienvenue 🚀",
desc:"Apprenez la médecine étape par étape",
heart:"Cœur",
heartInfo:"Le cœur pompe le sang dans le corps.",
lung:"Poumons",
brain:"Cerveau"
}
};

let lang = "en";

function setLang(l){
lang = l;
applyLang();
}

function getText(key){
return texts[lang][key];
}

function applyLang(){
document.getElementById("title").innerText = texts[lang].title;
document.getElementById("subtitle").innerText = texts[lang].subtitle;
document.getElementById("welcome").innerText = texts[lang].welcome;
document.getElementById("desc").innerText = texts[lang].desc;

document.querySelector(".heart").innerText = "❤️ " + texts[lang].heart;
document.getElementById("heartText").innerText = texts[lang].heartInfo;
document.getElementById("lungText").innerText = texts[lang].lung;
document.getElementById("brainText").innerText = texts[lang].brain;
}

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function answer(correct){
if(correct){
score++;
document.getElementById("result").innerText="✔ Correct";
}else{
document.getElementById("result").innerText="✖ Wrong";
}
document.getElementById("score").innerText=score;
}

function restart(){
score=0;
document.getElementById("score").innerText=score;
document.getElementById("result").innerText="";
}

function nextQuestion(){
current++;
if(current>=questions.length) current=0;

document.getElementById("question").innerText = questions[current].q;
document.getElementById("result").innerText="";
}

applyLang();

</script>

</body>
</html>
