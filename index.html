<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
/* =========================
   🌍 GLOBAL (REGINA MARIA STYLE)
========================= */
html, body{
margin:0;
padding:0;
scroll-behavior:smooth;
font-family:Arial, sans-serif;
background:#ffffff;
color:#111827;
height:100%;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

/* =========================
   🔴 LOGO
========================= */
.logo{
position:fixed;
top:15px;
left:15px;
font-weight:bold;
color:#e11d48;
font-size:20px;
z-index:1000;
}

/* =========================
   📱 SCREENS (SWIPE SECTIONS)
========================= */
section{
height:100vh;
scroll-snap-align:start;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

/* =========================
   🧠 CARDS
========================= */
.card{
width:90%;
max-width:500px;
background:#ffffff;
border:1px solid #e5e7eb;
border-radius:16px;
padding:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
margin-top:15px;
}

/* =========================
   🔘 QUIZ OPTIONS
========================= */
.option{
padding:12px;
margin:8px 0;
border-radius:12px;
border:1px solid #e5e7eb;
cursor:pointer;
}

.option:hover{
background:#f3f4f6;
}

/* =========================
   🔴 TITLES
========================= */
h1,h2{
margin:5px;
}

.red{
color:#e11d48;
}

/* =========================
   🧭 SMALL TEXT
========================= */
.small{
color:#6b7280;
font-size:14px;
}

/* =========================
   📱 SCROLL HINT
========================= */
.hint{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:12px;
color:#9ca3af;
}
</style>
</head>

<body>

<div class="logo">MedLearn</div>

<div class="hint">Swipe ↓</div>

<!-- ================= HOME ================= -->
<section>
<h1 class="red">MedLearn</h1>
<p class="small">Medical learning app for students</p>

<div class="card">
<h2>Welcome</h2>
<p>Swipe down to start learning</p>
</div>
</section>

<!-- ================= QUIZ ================= -->
<section>
<h2>🧠 Quiz</h2>

<div class="card">
<div id="q"></div>
<div id="opts"></div>
<p id="res"></p>
<p>Score: <span id="score">0</span></p>
</div>
</section>

<!-- ================= ANATOMY ================= -->
<section>
<h2>🫀 Anatomy</h2>

<div class="card">
<p onclick="info('Heart')">❤️ Heart</p>
<p onclick="info('Brain')">🧠 Brain</p>
<p onclick="info('Lungs')">🫁 Lungs</p>
<p onclick="info('Liver')">🟤 Liver</p>
<p onclick="info('Kidneys')">🟣 Kidneys</p>
<p onclick="info('Stomach')">🟡 Stomach</p>
</div>
</section>

<script>

/* ================= QUIZ DATA ================= */
let i=0;
let score=0;

const quiz=[
{q:"Main function of heart?",o:["Pump blood","Digest food","Think","Breathe"],a:0},
{q:"Where gas exchange happens?",o:["Alveoli","Heart","Liver","Brain"],a:0},
{q:"Kidneys function?",o:["Filter blood","Pump blood","Vision","Hearing"],a:0},
{q:"Brain controls?",o:["Body","Only heart","Only lungs","Nothing"],a:0}
];

/* ================= LOAD ================= */
function load(){
let q=quiz[i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((o,idx)=>{
html+=`<div class='option' onclick='ans(${idx})'>${o}</div>`;
});

document.getElementById("opts").innerHTML=html;
}

/* ================= ANSWER ================= */
function ans(x){
if(x===quiz[i].a){
score++;
document.getElementById("res").innerText="✔ Correct";
}else{
document.getElementById("res").innerText="✖ Wrong";
}
document.getElementById("score").innerText=score;
i++;
if(i>=quiz.length) i=0;
load();
}

/* ================= ANATOMY ================= */
function info(x){
alert(x + " - medical info");
}

load();

</script>

</body>
</html>
