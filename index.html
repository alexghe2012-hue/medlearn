<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#333;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* QUIZ */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

/* EXPLANATION BIGGER */
#explanation{
margin-top:25px;
min-height:260px;
font-size:18px;
color:#333;
line-height:1.8;
font-weight:500;
}

/* BADGE */
.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}
.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

/* SCORE */
.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}

/* ANATOMY FIXED */
.anatomy-card{
background:white;
padding:50px;
border-radius:30px;
width:95%;
max-width:1400px;
box-shadow:0 20px 60px rgba(0,0,0,0.18);
display:flex;
flex-direction:column;
gap:70px;
}

.anatomy-item h3{
font-size:34px;
margin:0;
color:#111;
}

iframe{
width:100%;
height:800px;
border:none;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start Quiz</button>
</div>

<!-- QUIZ -->
<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span> / 30</h2>

<div class="card">
<div id="badge" class="badge green">EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>
</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

</section>

<!-- ANATOMY -->
<section id="anatomy">

<h2 style="font-size:60px;color:#d90429;margin-bottom:40px;">
🫀 Anatomy Explorer
</h2>

<div class="anatomy-card">

<div class="anatomy-item">
<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Heart Anatomy</h3>
<iframe src="https://sketchfab.com/3d-models/heart-anatomy-and-functions-2e6726aca3e64c56b8f8d7cceae17a28/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Human Organs</h3>
<iframe src="https://sketchfab.com/3d-models/human-anatomy-organs-pack-7fd440196fe3480587de330967737848/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{
q:"Where does gas exchange occur?",
a:["Alveoli","Heart","Liver","Trachea"],
c:0,
e:{
easy:"Alveoli are tiny air sacs where oxygen enters blood.",
medium:"Gas exchange happens in alveoli where oxygen diffuses into capillaries and carbon dioxide leaves blood due to pressure gradients.",
hard:"Alveoli provide a massive surface area (~70m²) with extremely thin epithelial walls enabling rapid diffusion of oxygen into pulmonary capillaries and removal of CO2 from blood based on partial pressure differences."
}
},

{
q:"Heart function?",
a:["Pump blood","Digest food","Store oxygen","Make bile"],
c:0,
e:{
easy:"Heart pumps blood.",
medium:"The heart is a muscular organ that pumps blood through pulmonary and systemic circulation to deliver oxygen and nutrients.",
hard:"Through coordinated contraction of myocardium, the heart generates pressure gradients maintaining systemic and pulmonary circulation essential for oxygen delivery, waste removal, and homeostasis."
}
},

{
q:"Kidney unit?",
a:["Nephron","Neuron","Cell","Tissue"],
c:0,
e:{
easy:"Nephron filters blood.",
medium:"Nephrons are microscopic functional units of the kidney responsible for filtration and urine formation.",
hard:"Each nephron performs ultrafiltration, selective reabsorption, and secretion, regulating osmotic balance, electrolyte concentration, and acid-base homeostasis."
}
},

{
q:"RBC carries?",
a:["Oxygen","Sugar","Fat","CO2"],
c:0,
e:{
easy:"RBC carries oxygen.",
medium:"Red blood cells transport oxygen using hemoglobin.",
hard:"Hemoglobin’s iron-containing heme groups bind oxygen reversibly, enabling efficient oxygen transport from lungs to tissues."
}
},

{
q:"Skin function?",
a:["Protection","Digestion","Respiration","Circulation"],
c:0,
e:{
easy:"Protects body.",
medium:"Skin acts as a protective barrier and regulates temperature.",
hard:"The integumentary system provides immune defense, thermoregulation via sweat glands, and prevents dehydration through lipid-rich epidermal layers."
}
}

];

let i=0;
let score=0;
let locked=false;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function setBadge(){
let b=document.getElementById("badge");

if(i<10){
b.innerText="EASY";
b.className="badge green";
}
else if(i<20){
b.innerText="MEDIUM";
b.className="badge yellow";
}
else{
b.innerText="HARD";
b.className="badge red";
}
}

function load(){
locked=false;

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;
document.getElementById("score").innerText=score;

setBadge();

let html="";
q.a.forEach((a,idx)=>{
html+=`<div class="option" onclick="answer(${idx})">${a}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";
}

function answer(idx){
if(locked) return;
locked=true;

let exp = quiz[i].e;

if(idx===quiz[i].c){
score++;
}

document.getElementById("score").innerText=score;

if(i<10){
document.getElementById("explanation").innerText=exp.easy;
}
else if(i<20){
document.getElementById("explanation").innerText=exp.medium;
}
else{
document.getElementById("explanation").innerText=exp.hard;
}

document.querySelectorAll(".option").forEach(o=>{
o.style.pointerEvents="none";
});
}

window.onload=load;

</script>

</body>
</html>
