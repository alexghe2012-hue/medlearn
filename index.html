<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;

background:
linear-gradient(135deg,#eef7ff 0%,#dcefff 30%,#f4f8ff 60%,#ffe9e9 100%);

scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:110px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#444;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:25px;
width:520px;
box-shadow:0 10px 35px rgba(0,0,0,0.12);
}

.option{
background:#f3f3f3;
padding:14px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#explanation{
margin-top:15px;
font-size:15px;
color:#444;
min-height:90px;
line-height:1.4;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31212;
color:white;
cursor:pointer;
margin:6px;
}

.anatomy-card{
background:white;
padding:35px;
border-radius:30px;
width:95%;
max-width:1200px;
box-shadow:0 15px 45px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
gap:30px;
}

.model-box{
background:#f8fbff;
padding:20px;
border-radius:25px;
}

iframe{
width:100%;
height:650px;
border:none;
border-radius:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>

<button onclick="goQuiz()">Start Quiz</button>
</div>

<!-- QUIZ -->
<section id="quiz">
<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">
<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>
</div>

<p>Score: <span id="score">0</span></p>

<button onclick="goAnatomy()">Go to Anatomy</button>
</section>

<!-- ANATOMY (FIXED ORDER) -->
<section id="anatomy">

<h2 style="font-size:48px;color:#d90429;">🫀 Anatomy Explorer</h2>

<div class="anatomy-card">

<!-- 1. HUMAN BODY -->
<div class="model-box">
<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<!-- 2. HEART -->
<div class="model-box">
<h3>Heart</h3>
<iframe src="https://sketchfab.com/models/775d6629622740de8a5ed61a959c7506/embed"></iframe>
</div>

<!-- 3. COMPLETE HUMAN ANATOMY -->
<div class="model-box">
<h3>Complete Human Anatomy</h3>
<iframe src="https://sketchfab.com/3d-models/complete-human-anatomy-c904a5a65ae145a0bc535645c7e693af/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{q:"Where does gas exchange occur?",a:["Alveoli","Trachea","Heart","Liver"],c:0,e:"Gas exchange happens in alveoli."},
{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"Heart pumps blood."},
{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephron filters blood."},
{q:"RBC carries?",a:["Oxygen","Glucose","Waste","Hormones"],c:0,e:"RBC carries oxygen."},
{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"Skin protects body."}
];

let i=0;
let score=0;
let timer;

/* shuffle */
function shuffle(arr){
return arr.map(a=>({a,r:Math.random()}))
.sort((x,y)=>x.r-y.r)
.map(x=>x.a);
}

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

function load(){

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;

let answers=q.a.map((a,idx)=>({text:a,correct:idx===q.c}));
answers=shuffle(answers);

let html="";
answers.forEach(ans=>{
html+=`<div class="option" onclick="answer(${ans.correct})">${ans.text}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";

clearTimeout(timer);
timer=setTimeout(()=>next(),10000);
}

function answer(isCorrect){

if(isCorrect){
score++;
document.getElementById("score").innerText=score;
}

document.getElementById("explanation").innerText=quiz[i].e;

document.querySelectorAll(".option")
.forEach(o=>o.style.pointerEvents="none");

clearTimeout(timer);
setTimeout(next,2000);
}

function next(){
i++;
if(i>=quiz.length){
alert("Final Score: "+score);
i=0;
score=0;
document.getElementById("score").innerText=0;
}
load();
}

window.onload=load;

</script>

</body>
</html>
