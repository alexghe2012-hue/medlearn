<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:100px;
color:#d90429;
margin:0;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
width:520px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.option{
background:#f3f3f3;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffe5e5}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
background:#d90429;
color:white;
cursor:pointer;
}

.bar{
width:520px;
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.bar-fill{
height:100%;
background:#d90429;
width:0%;
transition:0.3s;
}

.badge{
font-weight:bold;
margin-bottom:10px;
}

.bullet{
display:inline-block;
width:10px;
height:10px;
border-radius:50%;
margin-right:6px;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

.review{
text-align:left;
max-width:600px;
background:white;
padding:20px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform</p>
<button onclick="startQuiz()">Start Quiz</button>
<button onclick="toggleMode()">Toggle Exam Mode</button>
</div>

<section id="quiz">

<div class="badge" id="levelInfo"></div>
<div class="badge">XP: <span id="xp">0</span> | Level: <span id="lvl">1</span> | 🔥 Streak: <span id="streak">0</span></div>

<div class="bar"><div class="bar-fill" id="progress"></div></div>

<h2 id="qtext"></h2>

<div class="card">
<div id="options"></div>
<div id="explanation"></div>
</div>

<button onclick="next()">Next</button>
</section>

<section id="reviewSection" style="display:none;">
<h2>Review Greșeli</h2>
<div id="review"></div>
</section>

<script>

const quiz = [
{q:"Gas exchange?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli allow oxygen/CO2 exchange."},
{q:"Heart pumps?",a:["Blood","Air","Food","Urine"],c:0,e:"Heart circulates blood."},
{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephron filters blood."},
{q:"RBC carries?",a:["Oxygen","Sugar","Fat","CO2 only"],c:0,e:"Hemoglobin binds oxygen."},
{q:"Largest organ?",a:["Skin","Liver","Heart","Brain"],c:0,e:"Skin protects body."}
];

let i=0;
let xp=0;
let level=1;
let streak=0;
let mistakes=[];
let examMode=false;

/* SOUND */
function beep(ok){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.type="sine";
o.frequency.value=ok?800:200;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

/* LEVEL */
function updateLevel(){
level=Math.floor(xp/50)+1;
document.getElementById("xp").innerText=xp;
document.getElementById("lvl").innerText=level;
document.getElementById("streak").innerText=streak;
}

/* BULLETS */
function difficultyLabel(){
if(i<1) return "🟢 EASY";
if(i<3) return "🟡 MEDIUM";
return "🔴 HARD";
}

/* LOAD */
function load(){

let q=quiz[i];

document.getElementById("qtext").innerText=q.q;
document.getElementById("levelInfo").innerHTML=difficultyLabel();

let answers=q.a.map((a,idx)=>({t:a,c:idx===q.c}));

answers.sort(()=>Math.random()-0.5);

let html="";
answers.forEach(a=>{
html+=`<div class="option" onclick="answer(${a.c},'${a.t}')">${a.t}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";

document.getElementById("progress").style.width=
((i/quiz.length)*100)+"%";
}

/* ANSWER */
function answer(correct,text){

if(correct){
xp+=10;
streak++;
beep(true);
}else{
streak=0;
beep(false);
mistakes.push(quiz[i]);
}

updateLevel();

if(!examMode){
document.getElementById("explanation").innerText=quiz[i].e;
}

document.querySelectorAll(".option").forEach(o=>o.style.pointerEvents="none");
}

/* NEXT */
function next(){
i++;

if(i>=quiz.length){
showReview();
return;
}

load();
}

/* REVIEW */
function showReview(){
document.getElementById("quiz").style.display="none";
document.getElementById("reviewSection").style.display="block";

let html="";
mistakes.forEach(m=>{
html+=`<div class="review"><b>${m.q}</b><br>${m.e}</div><br>`;
});

document.getElementById("review").innerHTML=html;
}

/* START */
function startQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

/* MODE */
function toggleMode(){
examMode=!examMode;
alert(examMode?"Exam Mode ON":"Exam Mode OFF");
}

updateLevel();
load();

</script>

</body>
</html>
