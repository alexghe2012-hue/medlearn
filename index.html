<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#333;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

/* QUIZ CARD */
.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

/* EXPLANATION */
#explanation{
margin-top:25px;
min-height:200px;
font-size:20px;
color:#333;
line-height:1.8;
font-weight:500;
}

/* SCORE FIX */
#scoreBox{
margin-top:10px;
font-weight:700;
color:#444;
}

/* BADGE */
.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

/* ANATOMY */
.anatomy-card{
background:white;
padding:35px;
border-radius:30px;
width:95%;
max-width:1200px;
box-shadow:0 15px 45px rgba(0,0,0,0.12);
}

.anatomy-item{
margin-bottom:60px;
}

.anatomy-item h3{
margin-bottom:15px;
font-size:24px;
color:#222;
}

iframe{
width:100%;
height:650px;
border:none;
border-radius:20px;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start Quiz</button>
</div>

<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span> / 30</h2>

<div class="card">
<div id="badge" class="badge green">EASY</div>

<div id="question"></div>

<div id="scoreBox">
Score: <span id="score">0</span>
</div>

<div id="options"></div>
<div id="explanation"></div>
</div>

<button onclick="restart()">Restart</button>
<button onclick="goAnatomy()">Anatomy</button>

</section>

<section id="anatomy">
<h2 style="font-size:48px;color:#d90429;">🫀 Anatomy Explorer</h2>

<div class="anatomy-card">

<div class="anatomy-item">
<h3>Human Body (Circulatory System)</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Heart Model</h3>
<iframe src="https://sketchfab.com/models/775d6629622740de8a5ed61a959c7506/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Complete Human Anatomy</h3>
<iframe src="https://sketchfab.com/3d-models/complete-human-anatomy-c904a5a65ae145a0bc535645c7e693af/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli are where oxygen enters blood and CO2 leaves."},
{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"Heart pumps blood constantly."},
{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephron filters blood."},
{q:"RBC carries?",a:["Oxygen","Sugar","Fat","CO2"],c:0,e:"RBC transports oxygen via hemoglobin."},
{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"Skin protects the body."},

{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Controls blood sugar."},
{q:"Arteries carry blood?",a:["Away from heart","To heart","Random","None"],c:0,e:"Arteries carry blood away."},
{q:"Veins carry blood?",a:["To heart","Away","Only oxygen","Only CO2"],c:0,e:"Veins return blood."},
{q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,e:"Controls all functions."},
{q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,e:"Respiration system."}
];

let i=0;
let score=0;
let timer;
let locked=false;

document.getElementById("score").innerText = score;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

function setBadge(){
let b=document.getElementById("badge");

if(i<10){b.innerText="EASY";b.className="badge green";}
else if(i<20){b.innerText="MEDIUM";b.className="badge yellow";}
else{b.innerText="HARD";b.className="badge red";}
}

function shuffle(arr){
for(let j=arr.length-1;j>0;j--){
let k=Math.floor(Math.random()*(j+1));
[arr[j],arr[k]]=[arr[k],arr[j]];
}
return arr;
}

function load(){

locked=false;

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;

setBadge();

let answers=q.a.map((t,idx)=>({t,correct:idx===q.c}));
answers=shuffle(answers);

let html="";
answers.forEach(a=>{
html+=`<div class="option" onclick="answer(${a.correct})">${a.t}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";

clearTimeout(timer);

/* ⏱️ 60 SEC */
timer=setTimeout(()=>next(),60000);
}

function answer(correct){

if(locked) return;
locked=true;

if(correct){
score++;
document.getElementById("score").innerText=score;
}

document.getElementById("explanation").innerText=quiz[i].e;

document.querySelectorAll(".option")
.forEach(o=>o.style.pointerEvents="none");

clearTimeout(timer);

/* safe next */
setTimeout(()=>{
next();
},3000);
}

function next(){

if(i>=quiz.length-1){
alert("Final Score: "+score+"/"+quiz.length);
i=0;
score=0;
}

i++;
load();
}

function restart(){
i=0;
score=0;
load();
}

window.onload=load;

</script>

</body>
</html>
