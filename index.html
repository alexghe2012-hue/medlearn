<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:110px;
color:#d90429;
margin:0;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

.card{
background:white;
padding:60px;
border-radius:25px;
width:850px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.option{
background:#f3f3f3;
padding:14px;
margin-top:10px;
border-radius:12px;
cursor:pointer;
}

.option:hover{background:#ffe5e5}

/* BADGE */
.badge{
padding:6px 12px;
border-radius:20px;
color:white;
font-weight:bold;
}
.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

/* TOP BAR */
.top{
display:flex;
justify-content:space-between;
width:850px;
margin-bottom:10px;
font-weight:bold;
}

/* PROGRESS */
.progress{
width:850px;
height:12px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:#e31229;
transition:0.3s;
}

/* REVIEW */
.review{
margin-top:20px;
background:#fff5f5;
padding:20px;
border-radius:15px;
display:none;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform</p>
<button onclick="start()">Start</button>
</div>

<section id="quiz">

<div class="top">
<div>XP: <span id="xp">0</span> | Level: <span id="level">1</span></div>
<div>🔥 Streak: <span id="streak">0</span></div>
</div>

<div class="progress"><div class="progress-bar" id="bar"></div></div>

<div class="card">

<div id="badge" class="badge green">EASY</div>

<h2 id="q"></h2>

<div id="options"></div>

<div id="exp"></div>

</div>

<button onclick="next()">NEXT</button>
<button onclick="restart()">RESTART</button>

<div class="review" id="reviewBox"></div>

</section>

<script>

const quiz = [
{q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli are where oxygen enters blood."},
{q:"Heart function?",a:["Pump blood","Digest","Store oxygen","Make bile"],c:0,e:"Heart pumps blood."},
{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephron filters blood."},
{q:"RBC carries?",a:["Oxygen","Sugar","Fat","CO2"],c:0,e:"RBC carries oxygen."},
{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"Skin protects body."}
];

let i=0;
let xp=0;
let level=1;
let streak=0;
let wrong=[];
let correctSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
let wrongSound=new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

function start(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
loadStreak();
}

function loadStreak(){
let last=localStorage.getItem("last");
let today=new Date().toDateString();

if(last!==today){
streak++;
localStorage.setItem("last",today);
}
document.getElementById("streak").innerText=streak;
}

function updateXP(){
xp+=10;
if(xp>=50){
level++;
xp=0;
}
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level;
}

function progress(){
document.getElementById("bar").style.width=(i/quiz.length)*100+"%";
}

function speak(text){
let u=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(u);
}

function load(){

let q=quiz[i];
document.getElementById("q").innerText=q.q;

let html="";
q.a.forEach((a,idx)=>{
html+=`<div class="option" onclick="answer(${idx})">${a}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("exp").innerText="";
progress();
}

function answer(idx){

if(idx===quiz[i].c){
xp+=10;
updateXP();
correctSound.play();
speak(quiz[i].e);
}
else{
wrong.push(quiz[i]);
wrongSound.play();
}

document.getElementById("exp").innerText=quiz[i].e;

document.querySelectorAll(".option").forEach(o=>o.style.pointerEvents="none");
}

function next(){
i++;
if(i>=quiz.length){
showReview();
return;
}
load();
}

function showReview(){
let box=document.getElementById("reviewBox");
box.style.display="block";

let html="<h3>🧠 Review greșeli</h3>";

wrong.forEach(w=>{
html+=`<p>❌ ${w.q}<br>👉 ${w.e}</p>`;
});

box.innerHTML=html;
}

function restart(){
i=0;
xp=0;
level=1;
wrong=[];
load();
}

</script>

</body>
</html>
