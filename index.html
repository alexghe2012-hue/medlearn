<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* QUIZ */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
font-size:18px;
color:#333;
line-height:1.8;
font-weight:500;
min-height:200px;
}

/* BULINE DIFICULTATE */
#badge{
position:absolute;
top:-15px;
left:-15px;
padding:8px 14px;
border-radius:20px;
font-size:13px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}

.button-row{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:20px;
}

.row{
display:flex;
gap:15px;
}

/* ANATOMY */
.anatomy-card{
background:white;
padding:50px;
border-radius:30px;
width:95%;
max-width:1400px;
box-shadow:0 20px 60px rgba(0,0,0,0.18);
display:flex;
flex-direction:column;
gap:70px;
}

iframe{
width:100%;
height:800px;
border:none;
border-radius:25px;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start</button>
</div>

<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">

<div id="badge" class="green">🟢 EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>

</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

<div class="button-row">
<div class="row">
<button onclick="next()">NEXT</button>
<button onclick="restart()">RESTART</button>
</div>
<div class="row">
<button onclick="goAnatomy()">ANATOMY</button>
</div>
</div>

</section>

<section id="anatomy">

<h2 style="font-size:60px;color:#d90429;">🫀 Anatomy</h2>

<div class="anatomy-card">

<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>

<h3>Heart</h3>
<iframe src="https://sketchfab.com/3d-models/heart-anatomy-and-functions-2e6726aca3e64c56b8f8d7cceae17a28/embed"></iframe>

<h3>Human Organs</h3>
<iframe src="https://sketchfab.com/3d-models/human-anatomy-organs-pack-7fd440196fe3480587de330967737848/embed"></iframe>

</div>
</section>

<script>

const quiz = [

/* 🟢 EASY (1–10) */
{d:"EASY",q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,
e:"Alveoli are microscopic air sacs where oxygen diffuses into blood and carbon dioxide is removed."},

{d:"EASY",q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,
e:"The heart pumps blood continuously through the body delivering oxygen and nutrients."},

{d:"EASY",q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,
e:"Nephron filters blood, removes waste and controls water balance."},

{d:"EASY",q:"RBC carries?",a:["Oxygen","Sugar","Fat","Hormones"],c:0,
e:"Red blood cells transport oxygen using hemoglobin."},

{d:"EASY",q:"Skin function?",a:["Protection","Digestion","Respiration","Circulation"],c:0,
e:"Skin protects body, regulates temperature and prevents water loss."},

{d:"EASY",q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,
e:"Brain controls all voluntary and involuntary body functions."},

{d:"EASY",q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,
e:"Lungs exchange oxygen and carbon dioxide during respiration."},

{d:"EASY",q:"Arteries carry?",a:["Away from heart","To heart","Both","None"],c:0,
e:"Arteries carry blood away from the heart under high pressure."},

{d:"EASY",q:"Veins carry?",a:["To heart","Away","Oxygen only","CO2 only"],c:0,
e:"Veins return blood to heart using valves."},

{d:"EASY",q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,
e:"Skin is the largest organ protecting entire body."},

/* 🟡 MEDIUM (11–20) */
{d:"MEDIUM",q:"SA node?",a:["Pacemaker","Filter","Pump","Valve"],c:0,
e:"SA node generates electrical impulses controlling heartbeat rhythm."},

{d:"MEDIUM",q:"Platelets?",a:["Clotting","Oxygen","Digestion","Hormones"],c:0,
e:"Platelets help blood clot and stop bleeding."},

{d:"MEDIUM",q:"Liver function?",a:["Detox","Breathing","Movement","Vision"],c:0,
e:"Liver detoxifies blood, produces bile and stores glycogen."},

{d:"MEDIUM",q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,
e:"Digestion starts in mouth with chewing and saliva enzymes."},

{d:"MEDIUM",q:"Neuron?",a:["Signal","Blood","Digestion","Clotting"],c:0,
e:"Neurons transmit electrical signals in nervous system."},

{d:"MEDIUM",q:"Hemoglobin?",a:["Oxygen","Sugar","Fat","Water"],c:0,
e:"Hemoglobin carries oxygen in red blood cells."},

{d:"MEDIUM",q:"Cerebellum?",a:["Balance","Vision","Digestion","Breathing"],c:0,
e:"Cerebellum controls balance and coordination."},

{d:"MEDIUM",q:"Pressure highest?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,
e:"Arteries have highest blood pressure."},

{d:"MEDIUM",q:"CNS?",a:["Brain+spine","Nerves","Muscles","Heart"],c:0,
e:"Central nervous system controls all body functions."},

{d:"MEDIUM",q:"Pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,
e:"SA node initiates heartbeat impulses."},

/* 🔴 HARD (21–30) */
{d:"HARD",q:"Nephron?",a:["Filtration","Digestion","Movement","Oxygen"],c:0,
e:"Nephron filters blood and regulates water, ions and waste precisely."},

{d:"HARD",q:"Oxygen binds?",a:["Hemoglobin iron","Plasma","Platelets","DNA"],c:0,
e:"Oxygen binds to iron in hemoglobin inside red blood cells."},

{d:"HARD",q:"Veins pressure?",a:["Low","High","Medium","None"],c:0,
e:"Veins have low pressure and rely on valves and muscle movement."},

{d:"HARD",q:"CNS?",a:["Brain+spine","Nerves","Muscles","Heart"],c:0,
e:"CNS includes brain and spinal cord controlling entire body."},

{d:"HARD",q:"Urea formed?",a:["Liver","Kidney","Heart","Lungs"],c:0,
e:"Liver converts ammonia into urea for excretion."},

{d:"HARD",q:"Diffusion?",a:["Passive movement","Active pump","Muscle force","Heartbeat"],c:0,
e:"Diffusion is movement from high to low concentration."},

{d:"HARD",q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,
e:"Red blood cells live about 120 days."},

{d:"HARD",q:"Pulmonary circulation?",a:["Heart-lungs-heart","Heart-body-heart","Brain-heart","Liver-heart"],c:0,
e:"Blood goes from heart to lungs and back for oxygenation."},

{d:"HARD",q:"Skin role?",a:["Protection","Digestion","Respiration","Circulation"],c:0,
e:"Skin protects body and regulates temperature and hydration."},

{d:"HARD",q:"Neurons do?",a:["Transmit signals","Store fat","Make blood","Digest food"],c:0,
e:"Neurons transmit electrical and chemical signals."}

];

let i=0;
let score=0;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function setBadge(){
let b=document.getElementById("badge");

if(quiz[i].d==="EASY"){
b.innerText="🟢 EASY";
b.className="green";
}
else if(quiz[i].d==="MEDIUM"){
b.innerText="🟡 MEDIUM";
b.className="yellow";
}
else{
b.innerText="🔴 HARD";
b.className="red";
}
}

function load(){
let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;
document.getElementById("score").innerText=score;

setBadge();

let html="";
q.a.forEach((a,idx)=>{
html+=`<div class="option" onclick="answer(${idx})">${a}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";
}

function answer(idx){
if(idx===quiz[i].c){
score++;
document.getElementById("score").innerText=score;
}
document.getElementById("explanation").innerText=quiz[i].e;
}

function next(){
if(i<quiz.length-1){
i++;
load();
}else{
alert("Final Score: "+score+"/30");
i=0;
score=0;
load();
}
}

function restart(){
i=0;
score=0;
load();
}
</script>

</body>
</html>
