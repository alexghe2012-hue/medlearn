<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#333;
}

/* BUTTONS */
button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* QUIZ */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
min-height:260px;
font-size:18px;
color:#333;
line-height:1.8;
font-weight:500;
}

/* SCORE */
.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}

/* BUTTON ROW */
.button-row{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:20px;
}

.row{
display:flex;
gap:15px;
}

/* ANATOMY */
.anatomy-card{
background:white;
padding:50px;
border-radius:30px;
width:95%;
max-width:1400px;
box-shadow:0 20px 60px rgba(0,0,0,0.18);
display:flex;
flex-direction:column;
gap:70px;
}

iframe{
width:100%;
height:800px;
border:none;
border-radius:25px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start</button>
</div>

<!-- QUIZ -->
<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span> / 30</h2>

<div class="card">

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>

</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

<div class="button-row">
<div class="row">
<button onclick="next()">NEXT</button>
<button onclick="restart()">RESTART</button>
</div>

<div class="row">
<button onclick="goAnatomy()">ANATOMY</button>
</div>
</div>

</section>

<!-- ANATOMY -->
<section id="anatomy">

<h2 style="font-size:60px;color:#d90429;">🫀 Anatomy</h2>

<div class="anatomy-card">

<div>
<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<div>
<h3>Heart</h3>
<iframe src="https://sketchfab.com/3d-models/heart-anatomy-and-functions-2e6726aca3e64c56b8f8d7cceae17a28/embed"></iframe>
</div>

<div>
<h3>Human Organs</h3>
<iframe src="https://sketchfab.com/3d-models/human-anatomy-organs-pack-7fd440196fe3480587de330967737848/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli perform gas exchange with very thin walls allowing oxygen to enter blood and CO2 to leave."},
{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"The heart is a muscular pump that circulates blood continuously through the body."},
{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephrons filter blood and regulate water, salts, and waste removal."},
{q:"RBC carries?",a:["Oxygen","Sugar","Fat","Hormones"],c:0,e:"Red blood cells carry oxygen using hemoglobin."},
{q:"Skin function?",a:["Protection","Digestion","Respiration","Circulation"],c:0,e:"Skin protects the body, regulates temperature and prevents water loss."},
{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Insulin regulates blood glucose levels."},
{q:"Arteries carry?",a:["Away from heart","To heart","Both","None"],c:0,e:"Arteries carry blood away from the heart under high pressure."},
{q:"Veins carry?",a:["To heart","Away","Oxygen only","CO2 only"],c:0,e:"Veins return blood to the heart using valves."},
{q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,e:"Brain controls all body functions."},
{q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,e:"Lungs exchange oxygen and carbon dioxide."},

{q:"SA node is?",a:["Pacemaker","Filter","Pump","Valve"],c:0,e:"SA node controls heartbeat rhythm."},
{q:"Platelets function?",a:["Clotting","Oxygen","Digestion","Hormones"],c:0,e:"Platelets stop bleeding by forming clots."},
{q:"Liver function?",a:["Detox","Breathing","Movement","Vision"],c:0,e:"Liver detoxifies blood and produces bile."},
{q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,e:"Digestion begins in the mouth."},
{q:"Neuron?",a:["Signal","Blood","Digestion","Clotting"],c:0,e:"Neurons transmit signals."},

{q:"Hemoglobin?",a:["Oxygen","Sugar","Fat","Water"],c:0,e:"Hemoglobin carries oxygen."},
{q:"Cerebellum?",a:["Balance","Vision","Digestion","Breathing"],c:0,e:"Controls balance and coordination."},
{q:"Pressure highest?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,e:"Arteries have highest pressure."},
{q:"CNS?",a:["Brain+spine","Nerves","Muscles","Heart"],c:0,e:"Central nervous system controls body."},
{q:"Pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,e:"Starts heartbeat impulses."},

{q:"Urea formed?",a:["Liver","Kidney","Heart","Lungs"],c:0,e:"Liver produces urea."},
{q:"Pulmonary?",a:["Heart-lungs-heart","Heart-body-heart","Brain-heart","Liver-heart"],c:0,e:"Blood goes to lungs for oxygenation."},
{q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,e:"Red blood cells live ~120 days."},
{q:"Diffusion?",a:["Passive movement","Active pump","Muscle force","Heartbeat"],c:0,e:"Movement from high to low concentration."},
{q:"Insulin role?",a:["Lower sugar","Increase oxygen","Make blood","Digest fats"],c:0,e:"Insulin lowers blood glucose."},

{q:"Nephron?",a:["Filtration","Digestion","Movement","Oxygen"],c:0,e:"Filters blood and forms urine."},
{q:"Oxygen binds?",a:["Hemoglobin iron","Plasma","Platelets","DNA"],c:0,e:"Oxygen binds iron in hemoglobin."},
{q:"Veins pressure?",a:["Low","High","Medium","None"],c:0,e:"Veins have low pressure."},
{q:"Skin?",a:["Protection","Digestion","Respiration","Circulation"],c:0,e:"Protects body from environment."}
];

let i=0;
let score=0;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

function load(){

let q = quiz[i];

document.getElementById("qnr").innerText = i+1;
document.getElementById("question").innerText = q.q;
document.getElementById("score").innerText = score;

let html = "";
q.a.forEach((a,idx)=>{
html += `<div class="option" onclick="answer(${idx})">${a}</div>`;
});

document.getElementById("options").innerHTML = html;
document.getElementById("explanation").innerText = "";
}

function answer(idx){

if(idx === quiz[i].c){
score++;
document.getElementById("score").innerText = score;
}

document.getElementById("explanation").innerText = quiz[i].e;
}

function next(){
if(i < quiz.length-1){
i++;
load();
}else{
alert("Final Score: " + score + "/30");
i = 0;
score = 0;
load();
}
}

function restart(){
i = 0;
score = 0;
load();
}

window.onload = load;

</script>

</body>
</html>
