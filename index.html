```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;

background: linear-gradient(180deg,#f5f7ff 0%,#e8f0ff 50%,#fff3f3 100%);

scroll-snap-type:y mandatory;
overflow-y:scroll;
scroll-behavior:smooth;
}

section{
height:100vh;
scroll-snap-align:start;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:30px;
text-align:center;
}

h1{
color:#e31212;
font-size:60px;
margin:0;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31212;
color:white;
cursor:pointer;
margin:5px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.option{
background:#f3f3f3;
padding:12px;
margin-top:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
font-weight:600;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#explanation{
margin-top:10px;
font-size:14px;
color:#555;
min-height:40px;
}

iframe{
width:100%;
height:400px;
border:none;
border-radius:12px;
max-width:900px;
}
</style>
</head>

<body>

<!-- HOME -->
<section>
<h1>🫀 MedLearn</h1>
<p>Medical learning platform — Quiz + Anatomy + Progress</p>
<button onclick="startQuiz()">Start Quiz</button>
</section>

<!-- QUIZ -->
<section>
<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">
<div id="question">Loading...</div>
<div id="options"></div>
<div id="explanation"></div>
</div>

<p>Score: <span id="score">0</span></p>

<button onclick="restart()">Restart</button>
</section>

<!-- ANATOMY -->
<section>
<h2>🫀 Anatomy</h2>
<p>Interactive 3D Heart Model</p>

<iframe src="https://sketchfab.com/models/775d6629622740de8a5ed61a959c7506/embed"></iframe>
</section>

<script>

/* QUIZ */
const quiz = [
{q:"Where does gas exchange occur?",a:["Alveoli","Trachea","Heart","Liver"],c:0,e:"Gas exchange happens in alveoli."},
{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"Heart pumps blood."},
{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephron is kidney unit."},
{q:"RBC carries?",a:["Oxygen","Glucose","Waste","Hormones"],c:0,e:"RBC carries oxygen."},
{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"Skin is largest organ."},
{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Pancreas produces insulin."},
{q:"Arteries carry blood?",a:["Away from heart","To heart","Random","Only oxygen"],c:0,e:"Arteries go away from heart."},
{q:"Veins carry blood?",a:["To heart","Away","Only oxygen","Only CO2"],c:0,e:"Veins go to heart."},
{q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,e:"Lungs do gas exchange."},
{q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,e:"Brain controls body."}
];

let i = 0;
let score = 0;

/* LOAD */
function load(){
let q = quiz[i];

document.getElementById("qnr").innerText = i+1;
document.getElementById("question").innerText = q.q;

let html = "";

q.a.forEach((ans,idx)=>{
html += `<div class="option" onclick="answer(${idx})">${ans}</div>`;
});

document.getElementById("options").innerHTML = html;
document.getElementById("explanation").innerText = "";
}

/* ANSWER */
function answer(x){
let q = quiz[i];

if(x === q.c){
score++;
document.getElementById("score").innerText = score;
}

document.getElementById("explanation").innerText = q.e;

document.querySelectorAll(".option")
.forEach(o=>o.style.pointerEvents="none");

setTimeout(()=>{
i++;

if(i >= quiz.length){
alert("Final Score: " + score + "/" + quiz.length);
i = 0;
score = 0;
document.getElementById("score").innerText = 0;
}

load();
},1200);
}

/* RESTART */
function restart(){
i = 0;
score = 0;
document.getElementById("score").innerText = 0;
load();
}

/* START */
function startQuiz(){
document.querySelectorAll("section")[1]
.scrollIntoView({behavior:"smooth"});
load();
}

/* AUTO LOAD */
window.onload = load;

</script>

</body>
</html>
```
