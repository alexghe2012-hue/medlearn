<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#333;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

/* QUIZ */
.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
min-height:260px;
font-size:20px;
color:#333;
line-height:1.8;
font-weight:500;
}

.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

/* SCORE */
.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start Quiz</button>
</div>

<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span> / 30</h2>

<div class="card">
<div id="badge" class="badge green">EASY</div>

<div id="question"></div>

<div id="options"></div>
<div id="explanation"></div>
</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

<button onclick="restart()">Restart</button>
<button onclick="next()">Next</button>
<button onclick="goAnatomy()">Anatomy</button>

</section>

<section id="anatomy">

<h2 style="font-size:48px;color:#d90429;">🫀 Anatomy Explorer</h2>

<div class="anatomy-card">

<div class="anatomy-item">
<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Heart Anatomy</h3>
<iframe src="https://sketchfab.com/3d-models/heart-anatomy-and-functions-2e6726aca3e64c56b8f8d7cceae17a28/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Human Organs</h3>
<iframe src="https://sketchfab.com/3d-models/human-anatomy-organs-pack-7fd440196fe3480587de330967737848/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli are where oxygen enters blood and CO2 leaves. This is essential for respiration."},

{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"Heart pumps blood to deliver oxygen and nutrients."},

{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"Nephron filters blood and produces urine."},

{q:"RBC carries?",a:["Oxygen","Sugar","Fat","CO2"],c:0,e:"RBC transports oxygen using hemoglobin."},

{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"Skin protects body and regulates temperature."},

{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Insulin controls blood sugar levels."},

{q:"Arteries carry blood?",a:["Away from heart","To heart","Both","None"],c:0,e:"Arteries carry blood away from heart."},

{q:"Veins carry blood?",a:["To heart","Away","Only oxygen","Only CO2"],c:0,e:"Veins return blood to heart."},

{q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,e:"Brain controls all body functions."},

{q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,e:"Lungs exchange oxygen and CO2."},

{q:"SA node?",a:["Pacemaker","Filter","Pump","Neuron"],c:0,e:"SA node controls heartbeat rhythm."},

{q:"Platelets?",a:["Clotting","Oxygen transport","Digestion","Hormones"],c:0,e:"Platelets help blood clot."},

{q:"Liver function?",a:["Detoxification","Breathing","Movement","Vision"],c:0,e:"Liver removes toxins from blood."},

{q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,e:"Digestion starts in the mouth."},

{q:"Neuron function?",a:["Signal transmission","Blood flow","Clotting","Digestion"],c:0,e:"Neurons transmit signals."},

{q:"Hemoglobin carries?",a:["Oxygen","Sugar","Fat","Water"],c:0,e:"Hemoglobin binds oxygen."},

{q:"Cerebellum?",a:["Balance","Vision","Digestion","Breathing"],c:0,e:"Controls balance and coordination."},

{q:"Blood pressure highest?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,e:"Arteries have highest pressure."},

{q:"CNS includes?",a:["Brain + spinal cord","Nerves","Muscles","Heart"],c:0,e:"Brain and spinal cord."},

{q:"Heart pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,e:"SA node starts heartbeat."},

{q:"Urea formed in?",a:["Liver","Kidney","Heart","Lungs"],c:0,e:"Liver produces urea."},

{q:"Pulmonary circulation?",a:["Heart-lungs-heart","Heart-body-heart","Brain-heart-brain","Liver-heart-liver"],c:0,e:"Blood goes heart → lungs → heart."},

{q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,e:"RBC lives ~120 days."},

{q:"Diffusion?",a:["Passive movement","Active pump","Muscle force","Heartbeat"],c:0,e:"Movement from high to low concentration."},

{q:"Insulin role?",a:["Lower blood sugar","Increase oxygen","Make blood","Digest fats"],c:0,e:"Insulin lowers glucose."},

{q:"Nephron function?",a:["Filtration","Digestion","Breathing","Movement"],c:0,e:"Filters blood in kidneys."},

{q:"Oxygen binds to?",a:["Hemoglobin iron","Plasma","Platelets","DNA"],c:0,e:"Oxygen binds iron in hemoglobin."},

{q:"Veins pressure?",a:["Low","High","Medium","None"],c:0,e:"Veins have low pressure."},

{q:"Skin function?",a:["Protection","Digestion","Respiration","Circulation"],c:0,e:"Protects body."}
];

let i=0;
let score=0;
let locked=false;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

function load(){

locked=false;

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;

document.getElementById("score").innerText=score;

let html="";
q.a.forEach((a,idx)=>{
html+=`<div class="option" onclick="answer(${idx})">${a}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";
}

function answer(idx){

if(locked) return;
locked=true;

if(idx===quiz[i].c){
score++;
document.getElementById("score").innerText=score;
}

document.getElementById("explanation").innerText=quiz[i].e;

document.querySelectorAll(".option")
.forEach(o=>o.style.pointerEvents="none");
}

function next(){
if(i<quiz.length-1){
i++;
load();
}
else{
alert("Final Score: "+score+"/"+quiz.length);
i=0;
score=0;
load();
}
}

function restart(){
i=0;
score=0;
load();
}

window.onload=load;

</script>

</body>
</html>
