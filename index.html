<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

.hero p{
font-size:20px;
color:#333;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
min-height:220px;
font-size:20px;
color:#333;
line-height:1.8;
font-weight:500;
}

.badge{
position:absolute;
top:-15px;
left:-15px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

.anatomy-card{
background:white;
padding:35px;
border-radius:30px;
width:95%;
max-width:1200px;
box-shadow:0 15px 45px rgba(0,0,0,0.12);
}

.anatomy-item{
margin-bottom:60px;
}

.anatomy-item h3{
margin-bottom:15px;
font-size:24px;
color:#222;
}

iframe{
width:100%;
height:650px;
border:none;
border-radius:20px;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start Quiz</button>
</div>

<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span> / 30</h2>

<div class="card">
<div id="badge" class="badge green">EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>
</div>

<button onclick="restart()">Restart</button>
<button onclick="goAnatomy()">Anatomy</button>

</section>

<section id="anatomy">
<h2 style="font-size:48px;color:#d90429;">🫀 Anatomy Explorer</h2>

<div class="anatomy-card">

<div class="anatomy-item">
<h3>Human Body (Circulatory System)</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Heart Model</h3>
<iframe src="https://sketchfab.com/models/775d6629622740de8a5ed61a959c7506/embed"></iframe>
</div>

<div class="anatomy-item">
<h3>Complete Human Anatomy</h3>
<iframe src="https://sketchfab.com/3d-models/complete-human-anatomy-c904a5a65ae145a0bc535645c7e693af/embed"></iframe>
</div>

</div>
</section>

<script>

const quiz = [
{q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,e:"Alveoli are tiny air sacs in the lungs where oxygen enters the blood and carbon dioxide is removed through diffusion across thin membranes."},

{q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,e:"The heart is a muscular pump that continuously circulates blood, ensuring oxygen and nutrients reach all tissues."},

{q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,e:"The nephron filters blood, removes waste, balances fluids, and maintains electrolyte balance in the body."},

{q:"RBC carries?",a:["Oxygen","Sugar","Fat","CO2"],c:0,e:"Red blood cells transport oxygen using hemoglobin, enabling cellular respiration throughout the body."},

{q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,e:"The skin acts as a protective barrier, regulates temperature, and prevents dehydration."},

{q:"Insulin produced by?",a:["Pancreas","Liver","Kidney","Heart"],c:0,e:"Insulin is a hormone that regulates blood glucose levels by allowing cells to absorb sugar."},

{q:"Arteries carry blood?",a:["Away from heart","To heart","Random","None"],c:0,e:"Arteries carry oxygen-rich blood away from the heart under high pressure."},

{q:"Veins carry blood?",a:["To heart","Away","Only oxygen","Only CO2"],c:0,e:"Veins return deoxygenated blood to the heart and contain valves to prevent backflow."},

{q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,e:"The brain is the central control system responsible for movement, thought, and vital functions."},

{q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,e:"The lungs perform respiration by exchanging oxygen and carbon dioxide with the blood."},

{q:"SA node function?",a:["Pacemaker","Filter","Pump","Sensor"],c:0,e:"The SA node regulates heartbeat by generating electrical impulses."},

{q:"Platelets?",a:["Clotting","Oxygen","Hormones","Digestion"],c:0,e:"Platelets help blood clot to prevent bleeding after injury."},

{q:"Liver function?",a:["Detox","Breathing","Movement","Vision"],c:0,e:"The liver detoxifies blood, produces bile, and processes nutrients."},

{q:"Neuron function?",a:["Signal","Blood","Digestion","Clotting"],c:0,e:"Neurons transmit electrical signals throughout the nervous system."},

{q:"Hemoglobin?",a:["Oxygen","Glucose","Fat","Hormones"],c:0,e:"Hemoglobin binds oxygen molecules in red blood cells for transport."},

{q:"Cerebellum?",a:["Balance","Vision","Digestion","Speech"],c:0,e:"The cerebellum controls balance, coordination, and posture."},

{q:"Blood pressure highest?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,e:"Arteries experience the highest blood pressure due to direct pumping from the heart."},

{q:"CNS?",a:["Brain+spine","Nerves","Heart","Muscles"],c:0,e:"The central nervous system includes the brain and spinal cord."},

{q:"Pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,e:"The SA node initiates and controls heartbeat rhythm."},

{q:"Urea formed?",a:["Liver","Kidney","Heart","Lung"],c:0,e:"The liver converts ammonia into urea for safe excretion."},

{q:"Pulmonary?",a:["Heart-lungs-heart","Heart-body-heart","Lungs-brain-heart","Heart-liver"],c:0,e:"Pulmonary circulation moves blood between heart and lungs for oxygenation."},

{q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,e:"Red blood cells live about 120 days before being recycled."},

{q:"Diffusion?",a:["Gas movement","Active transport","Osmosis","Pump"],c:0,e:"Diffusion is the passive movement of molecules from high to low concentration."},

{q:"Insulin?",a:["Sugar control","Fat storage","Breathing","Digestion"],c:0,e:"Insulin regulates glucose uptake in cells."},

{q:"Nephron?",a:["Filtration","Digestion","Movement","Oxygen"],c:0,e:"Nephrons filter blood and form urine."},

{q:"Oxygen binds?",a:["Hemoglobin","Plasma","Platelets","DNA"],c:0,e:"Oxygen binds to iron in hemoglobin molecules."},

{q:"Veins pressure?",a:["Low","High","Equal","None"],c:0,e:"Veins operate at lower pressure compared to arteries."},

{q:"Skin?",a:["Protection","Digestion","Respiration","Circulation"],c:0,e:"Skin protects the body and regulates temperature."}
];

let i=0;
let score=0;
let timer;

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function goAnatomy(){
document.getElementById("anatomy").scrollIntoView({behavior:"smooth"});
}

function setBadge(){
let b=document.getElementById("badge");

if(i<10){b.innerText="EASY";b.className="badge green";}
else if(i<20){b.innerText="MEDIUM";b.className="badge yellow";}
else{b.innerText="HARD";b.className="badge red";}
}

function shuffle(arr){
for(let j=arr.length-1;j>0;j--){
let k=Math.floor(Math.random()*(j+1));
[arr[j],arr[k]]=[arr[k],arr[j]];
}
return arr;
}

function load(){

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;

setBadge();

let answers=q.a.map((t,idx)=>({t,correct:idx===q.c}));
answers=shuffle(answers);

let html="";
answers.forEach(a=>{
html+=`<div class="option" onclick="answer(${a.correct})">${a.t}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";

clearTimeout(timer);

/* ⏱️ 60 SECUNDES */
timer=setTimeout(()=>next(),60000);
}

function answer(correct){
if(correct) score++;

document.getElementById("explanation").innerText=quiz[i].e;

document.querySelectorAll(".option")
.forEach(o=>o.style.pointerEvents="none");

clearTimeout(timer);
setTimeout(next,3000);
}

function next(){
i++;

if(i>=quiz.length){
alert("Final Score: "+score+"/"+quiz.length);
i=0;
score=0;
}

load();
}

function restart(){
i=0;
score=0;
load();
}

window.onload=load;

</script>

</body>
</html>
