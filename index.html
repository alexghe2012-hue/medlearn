<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef7ff,#dcefff,#ffe9e9);
scroll-behavior:smooth;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:120px;
color:#d90429;
margin:0;
font-weight:900;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#e31229;
color:white;
cursor:pointer;
margin:6px;
font-size:15px;
}

/* QUIZ */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:80px 20px;
text-align:center;
}

.card{
background:white;
padding:70px;
border-radius:32px;
width:900px;
min-height:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.18);
position:relative;
}

.option{
background:#f3f3f3;
padding:16px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.option:hover{
transform:scale(1.03);
background:#ffe5e5;
}

#question{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

#explanation{
margin-top:25px;
font-size:18px;
color:#333;
line-height:1.8;
font-weight:500;
min-height:200px;
}

/* BULINE DIFICULTATE */
#badge{
position:absolute;
top:-15px;
left:-15px;
padding:8px 14px;
border-radius:20px;
font-size:13px;
font-weight:bold;
color:white;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

.score-bottom{
margin-top:25px;
font-size:20px;
font-weight:700;
color:#333;
}

.button-row{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:20px;
}

.row{
display:flex;
gap:15px;
}

/* ANATOMY */
.anatomy-card{
background:white;
padding:50px;
border-radius:30px;
width:95%;
max-width:1400px;
box-shadow:0 20px 60px rgba(0,0,0,0.18);
display:flex;
flex-direction:column;
gap:70px;
}

iframe{
width:100%;
height:800px;
border:none;
border-radius:25px;
}
</style>
</head>

<body>

<div class="hero">
<h1>MedLearn</h1>
<p>Medical learning platform for students</p>
<button onclick="goQuiz()">Start</button>
</div>

<section id="quiz">

<h2>🧠 Question <span id="qnr">1</span>/30</h2>

<div class="card">

<div id="badge" class="green">🟢 EASY</div>

<div id="question"></div>
<div id="options"></div>
<div id="explanation"></div>

</div>

<div class="score-bottom">
Score: <span id="score">0</span>
</div>

<div class="button-row">
<div class="row">
<button onclick="next()">NEXT</button>
<button onclick="restart()">RESTART</button>
</div>
<div class="row">
<button onclick="goAnatomy()"> 🫀ANATOMY</button>
</div>
</div>

</section>

<section id="anatomy">

<h2 style="font-size:60px;color:#d90429;">🫀 Anatomy</h2>

<div class="anatomy-card">

<h3>Human Body</h3>
<iframe src="https://sketchfab.com/3d-models/animated-human-body-with-circulatory-system-6a7a537a71444f6e8201e18a685a013d/embed"></iframe>

<h3>Heart</h3>
<iframe src="https://sketchfab.com/3d-models/heart-anatomy-and-functions-2e6726aca3e64c56b8f8d7cceae17a28/embed"></iframe>

<h3>Human Organs</h3>
<iframe src="https://sketchfab.com/3d-models/human-anatomy-organs-pack-7fd440196fe3480587de330967737848/embed"></iframe>

</div>
</section>

<script>

const quiz = [

/* 🟢 EASY (1–10) */

{d:"EASY",q:"Gas exchange occurs in?",a:["Alveoli","Heart","Liver","Trachea"],c:0,
e:"Gas exchange occurs in the alveoli, which are microscopic air sacs located at the end of the respiratory tree inside the lungs. These alveoli are surrounded by an extremely dense network of capillaries, forming a very thin barrier between air and blood. Because the wall is only one cell thick, oxygen can easily diffuse from inhaled air into the bloodstream, while carbon dioxide diffuses in the opposite direction to be exhaled. This process is fundamental for life because every single cell in the human body depends on oxygen to produce energy through cellular respiration (ATP production)."},

{d:"EASY",q:"Heart function?",a:["Pump blood","Digest food","Store oxygen","Make bile"],c:0,
e:"The heart is a muscular organ whose main function is to pump blood continuously throughout the entire body. It works as a double pump system: the right side sends deoxygenated blood to the lungs for oxygenation, while the left side distributes oxygen-rich blood to all organs and tissues. This continuous circulation ensures that oxygen, nutrients, and hormones reach every cell while waste products like carbon dioxide are efficiently removed. Without the heart, circulation would stop within minutes, making it one of the most vital organs in the body."},

{d:"EASY",q:"Kidney unit?",a:["Nephron","Neuron","Cell","Tissue"],c:0,
e:"The nephron is the structural and functional unit of the kidney, and each kidney contains around one million nephrons. Its main role is to filter blood and maintain homeostasis by regulating water balance, electrolyte levels, and waste removal. The nephron performs three major processes: filtration (removing waste from blood), reabsorption (returning useful substances like glucose and water), and secretion (eliminating additional toxins). This ensures that the internal environment of the body remains stable."},

{d:"EASY",q:"RBC carries?",a:["Oxygen","Sugar","Fat","Hormones"],c:0,
e:"Red blood cells (RBCs) are specialized cells designed to transport oxygen from the lungs to all tissues of the body. They contain a protein called hemoglobin, which has iron atoms that bind oxygen molecules. This binding is reversible, meaning oxygen is picked up in the lungs and released where it is needed. RBCs also help transport a portion of carbon dioxide back to the lungs. Their biconcave shape increases surface area, making oxygen exchange more efficient."},

{d:"EASY",q:"Skin function?",a:["Protection","Digestion","Respiration","Circulation"],c:0,
e:"The skin is the largest organ of the human body and serves multiple essential functions. It acts as a protective barrier against bacteria, viruses, UV radiation, and physical injuries. It also prevents excessive water loss, regulates body temperature through sweating and blood vessel dilation, and contains sensory receptors that detect pain, temperature, and touch. Without the skin, the body would be highly vulnerable to infection and dehydration."},

{d:"EASY",q:"Brain controls?",a:["Body","Heart","Lungs","Nothing"],c:0,
e:"The brain is the central control system of the human body. It processes sensory information, generates thoughts, controls voluntary movements, and regulates involuntary functions such as breathing and heartbeat. It communicates with the entire body through the nervous system using electrical and chemical signals. Every action, emotion, memory, and reflex originates or is coordinated by the brain."},

{d:"EASY",q:"Lungs function?",a:["Gas exchange","Digestion","Filtration","Movement"],c:0,
e:"The lungs are responsible for respiration, specifically gas exchange between air and blood. When we inhale, oxygen enters the alveoli and diffuses into the bloodstream. At the same time, carbon dioxide moves from the blood into the lungs to be exhaled. This process is essential for maintaining oxygen supply to cells and removing metabolic waste gases."},

{d:"EASY",q:"Arteries carry?",a:["Away from heart","To heart","Both","None"],c:0,
e:"Arteries are blood vessels that carry blood away from the heart under high pressure. Most arteries carry oxygen-rich blood, except pulmonary arteries, which carry deoxygenated blood to the lungs. Their thick, muscular walls help withstand and maintain the pressure generated by the heart’s pumping action."},

{d:"EASY",q:"Veins carry?",a:["To heart","Away","Oxygen only","CO2 only"],c:0,
e:"Veins are blood vessels that return blood back to the heart. They usually carry deoxygenated blood, except pulmonary veins, which carry oxygenated blood from the lungs. Veins contain valves that prevent backflow of blood and help blood return to the heart despite low pressure."},

{d:"EASY",q:"Largest organ?",a:["Skin","Heart","Liver","Brain"],c:0,
e:"The skin is the largest organ of the human body in terms of surface area and weight. It covers the entire body and acts as the first line of defense against environmental threats while also helping regulate temperature and hydration."},

/* 🟡 MEDIUM (11–20) */

{d:"MEDIUM",q:"SA node?",a:["Pacemaker","Filter","Pump","Valve"],c:0,
e:"The sinoatrial (SA) node is a specialized group of cells located in the right atrium of the heart. It acts as the natural pacemaker by generating electrical impulses that initiate each heartbeat. These impulses spread through the atria, causing them to contract, and then travel to the ventricles, ensuring coordinated pumping of blood. Without the SA node, the heart would lose its rhythmic beating pattern."},

{d:"MEDIUM",q:"Platelets?",a:["Clotting","Oxygen","Digestion","Hormones"],c:0,
e:"Platelets are small cell fragments in the blood that play a key role in hemostasis, the process of stopping bleeding. When a blood vessel is damaged, platelets quickly accumulate at the injury site, stick together, and release chemicals that activate clotting proteins. This leads to the formation of a fibrin clot, which seals the wound and prevents blood loss while healing occurs."},

{d:"MEDIUM",q:"Liver function?",a:["Detox","Breathing","Movement","Vision"],c:0,
e:"The liver is a vital metabolic organ responsible for detoxifying harmful substances such as drugs and alcohol. It also produces bile for fat digestion, stores energy in the form of glycogen, and synthesizes important proteins needed for blood clotting. It plays a central role in metabolism and maintaining chemical balance in the body."},

{d:"MEDIUM",q:"Digestion starts?",a:["Mouth","Stomach","Intestine","Liver"],c:0,
e:"Digestion begins in the mouth, where both mechanical and chemical digestion occur. Teeth break food into smaller pieces while saliva moistens it. Saliva contains enzymes like amylase that start breaking down carbohydrates into simpler sugars. This early stage is important because it prepares food for further digestion in the stomach and intestines."},

{d:"MEDIUM",q:"Neuron?",a:["Signal","Blood","Digestion","Clotting"],c:0,
e:"Neurons are specialized nerve cells that transmit information throughout the nervous system. They send electrical impulses along their axons and communicate with other neurons using chemical messengers called neurotransmitters. This allows fast communication between the brain, spinal cord, and the rest of the body, enabling movement, sensation, and cognition."},

{d:"MEDIUM",q:"Hemoglobin?",a:["Oxygen","Sugar","Fat","Water"],c:0,
e:"Hemoglobin is a protein found in red blood cells that binds to oxygen molecules in the lungs and transports them to tissues throughout the body. Its iron-containing structure allows reversible binding, making oxygen delivery highly efficient and essential for survival."},

{d:"MEDIUM",q:"Cerebellum?",a:["Balance","Vision","Digestion","Breathing"],c:0,
e:"The cerebellum is a part of the brain responsible for coordination, balance, and fine motor control. It ensures smooth and precise movements by integrating sensory input with motor commands, helping maintain posture and stability during activities like walking or writing."},

{d:"MEDIUM",q:"Pressure highest?",a:["Arteries","Veins","Capillaries","Lymph"],c:0,
e:"Blood pressure is highest in arteries because they receive blood directly from the heart’s powerful contractions. Their thick, elastic walls are designed to withstand this pressure and maintain continuous blood flow to organs."},

{d:"MEDIUM",q:"CNS?",a:["Brain+spine","Nerves","Muscles","Heart"],c:0,
e:"The central nervous system (CNS) consists of the brain and spinal cord. It is responsible for processing all incoming information and coordinating responses. It acts as the control center of the body, integrating sensory input and motor output."},

{d:"MEDIUM",q:"Pacemaker?",a:["SA node","AV node","Purkinje","Bundle"],c:0,
e:"The SA node acts as the natural pacemaker of the heart by generating rhythmic electrical impulses. These impulses control the timing of heart contractions and ensure efficient blood circulation."},

/* 🔴 HARD (21–30) */

{d:"HARD",q:"Nephron?",a:["Filtration","Digestion","Movement","Oxygen"],c:0,
e:"The nephron is the microscopic functional unit of the kidney that performs blood filtration and urine formation. It regulates water balance, electrolytes, and removes metabolic waste. It works through filtration in the glomerulus, reabsorption of useful substances, and secretion of toxins, maintaining strict homeostasis in the body."},

{d:"HARD",q:"Oxygen binds?",a:["Hemoglobin iron","Plasma","Platelets","DNA"],c:0,
e:"Oxygen binds to the iron atoms within hemoglobin molecules inside red blood cells. This binding is reversible, allowing oxygen to be picked up in the lungs and released in tissues where oxygen levels are low and demand is high."},

{d:"HARD",q:"Veins pressure?",a:["Low","High","Medium","None"],c:0,
e:"Veins carry blood at low pressure because most of the force from the heart is lost after blood passes through capillaries. To compensate, veins use valves and muscle contractions to push blood back toward the heart."},

{d:"HARD",q:"CNS?",a:["Brain+spine","Nerves","Muscles","Heart"],c:0,
e:"The central nervous system (CNS) integrates sensory information and coordinates body responses. The brain processes information while the spinal cord transmits signals between the brain and the rest of the body."},

{d:"HARD",q:"Urea formed?",a:["Liver","Kidney","Heart","Lungs"],c:0,
e:"Urea is produced in the liver through the urea cycle, which converts toxic ammonia (a waste product of protein metabolism) into urea. This urea is then transported to the kidneys for excretion in urine."},

{d:"HARD",q:"Diffusion?",a:["Passive movement","Active pump","Muscle force","Heartbeat"],c:0,
e:"Diffusion is the passive movement of molecules from an area of high concentration to an area of low concentration. It does not require energy and is essential for processes like gas exchange in the lungs."},

{d:"HARD",q:"RBC lifespan?",a:["120 days","30 days","1 year","10 days"],c:0,
e:"Red blood cells circulate for approximately 120 days before being broken down by the spleen and liver. Their components are recycled, especially iron from hemoglobin, which is reused to form new RBCs."},

{d:"HARD",q:"Pulmonary circulation?",a:["Heart-lungs-heart","Heart-body-heart","Brain-heart","Liver-heart"],c:0,
e:"Pulmonary circulation is the pathway where blood travels from the right side of the heart to the lungs for oxygenation and then returns to the left side of the heart. This process ensures oxygen enrichment of blood."},

{d:"HARD",q:"Skin role?",a:["Protection","Digestion","Respiration","Circulation"],c:0,
e:"The skin protects the body from physical damage, pathogens, and dehydration. It also regulates temperature and contains sensory receptors that detect environmental stimuli."},

{d:"HARD",q:"Neurons do?",a:["Transmit signals","Store fat","Make blood","Digest food"],c:0,
e:"Neurons transmit electrical and chemical signals throughout the nervous system. This allows rapid communication between different parts of the body and enables all functions from movement to thinking."}

];

let i=0;
let score=0;

/* 🔥 shuffle corect */
function shuffleArray(arr){
let a = arr.slice();
for(let i = a.length - 1; i > 0; i--){
let j = Math.floor(Math.random() * (i + 1));
[a[i], a[j]] = [a[j], a[i]];
}
return a;
}

function goQuiz(){
document.getElementById("quiz").scrollIntoView({behavior:"smooth"});
load();
}

function setBadge(){
let b=document.getElementById("badge");

if(quiz[i].d==="EASY"){
b.innerText="🟢 EASY";
b.className="green";
}
else if(quiz[i].d==="MEDIUM"){
b.innerText="🟡 MEDIUM";
b.className="yellow";
}
else{
b.innerText="🔴 HARD";
b.className="red";
}
}

function load(){

let q=quiz[i];

document.getElementById("qnr").innerText=i+1;
document.getElementById("question").innerText=q.q;
document.getElementById("score").innerText=score;

setBadge();

/* 🔥 RANDOM ANSWERS REAL */
let options = q.a.map((text, idx) => {
return {
text: text,
correct: idx === q.c
};
});

options = shuffleArray(options);

let html="";
options.forEach(opt=>{
html += `<div class="option" onclick="answer(${opt.correct})">${opt.text}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("explanation").innerText="";
}

function answer(isCorrect){

if(isCorrect){
score++;
document.getElementById("score").innerText=score;
}

document.getElementById("explanation").innerText=quiz[i].e;
}

function next(){
if(i < quiz.length-1){
i++;
load();
}else{
alert("Final Score: "+score+"/30");
i=0;
score=0;
load();
}
}

function restart(){
i=0;
score=0;
load();
}
}

function restart(){
i=0;
score=0;
load();
}
</script>

</body>
</html>
