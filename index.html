<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn Next Level</title>

<style>
body{
margin:0;
font-family:Arial;
background:#ffffff;
color:#111827;
}

/* HEADER */
header{
background:#e11d48;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

/* SECTIONS */
section{
padding:20px;
max-width:900px;
margin:auto;
}

/* CARD */
.card{
border:1px solid #e5e7eb;
border-radius:16px;
padding:15px;
margin:10px 0;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

/* BUTTONS */
button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#111827;
color:white;
margin:5px;
}

button:hover{
background:#374151;
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
width:90%;
margin:5px 0;
}

/* PROGRESS BAR */
.bar{
height:10px;
background:#e5e7eb;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#e11d48;
width:0%;
}

/* ANATOMY IMAGE */
.anatomy{
position:relative;
max-width:400px;
margin:auto;
}

.anatomy img{
width:100%;
border-radius:12px;
}

.hotspot{
position:absolute;
width:20px;
height:20px;
background:red;
border-radius:50%;
cursor:pointer;
}

/* POSITIONS (simplified) */
#heart{top:45%;left:48%;}
#brain{top:15%;left:45%;}
#lungs{top:35%;left:40%;}
#liver{top:55%;left:50%;}
#kidney{top:60%;left:60%;}
</style>
</head>

<body>

<header>
🫀 MedLearn NEXT LEVEL
</header>

<!-- ================= LOGIN ================= -->
<section id="login">
<h2>Login / Register</h2>

<div class="card">
<input id="user" placeholder="Username">
<button onclick="login()">Enter App</button>
<p id="msg"></p>
</div>
</section>

<!-- ================= DASHBOARD ================= -->
<section id="dash" style="display:none">

<h2>📊 Student Progress</h2>

<div class="card">
<p>User: <span id="uname"></span></p>

<div class="bar"><div class="fill" id="xpbar"></div></div>
<p>XP: <span id="xp">0</span> / 100</p>

<button onclick="addXP()">+ Gain XP</button>
</div>

<!-- ANATOMY -->
<h2>🫀 Anatomy Interactive</h2>

<div class="card">
<div class="anatomy">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Heart_anterior_exterior_view.jpg">

<div class="hotspot" id="heart" onclick="info('Heart - pumps blood')"></div>
<div class="hotspot" id="brain" onclick="info('Brain - controls body')"></div>
<div class="hotspot" id="lungs" onclick="info('Lungs - breathing')"></div>
<div class="hotspot" id="liver" onclick="info('Liver - detox')"></div>
<div class="hotspot" id="kidney" onclick="info('Kidneys - filtration')"></div>

</div>
</div>

</section>

<script>

/* ================= STATE ================= */
let user="";
let xp=0;

/* ================= LOGIN ================= */
function login(){
user=document.getElementById("user").value;

if(!user){
document.getElementById("msg").innerText="Enter username";
return;
}

localStorage.setItem("user",user);
loadUser();

document.getElementById("login").style.display="none";
document.getElementById("dash").style.display="block";
}

/* ================= LOAD USER ================= */
function loadUser(){
user=localStorage.getItem("user");
if(user){
document.getElementById("uname").innerText=user;
}
}

/* ================= XP SYSTEM ================= */
function addXP(){
xp+=10;

if(xp>100) xp=100;

document.getElementById("xp").innerText=xp;
document.getElementById("xpbar").style.width=xp+"%";

localStorage.setItem("xp",xp);
}

/* ================= ANATOMY INFO ================= */
function info(text){
alert(text);
}

/* LOAD SAVED DATA */
loadUser();

xp=parseInt(localStorage.getItem("xp")||0);
document.addEventListener("DOMContentLoaded",()=>{
document.getElementById("xp").innerText=xp;
document.getElementById("xpbar").style.width=xp+"%";
});

</script>

</body>
</html>
